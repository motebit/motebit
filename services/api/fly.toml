app = "motebit-sync"
primary_region = "sjc"
kill_signal = "SIGINT"
kill_timeout = 5

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  MOTEBIT_DB_PATH = "/data/motebit.db"
  # Litestream S3 replication (optional — set via `fly secrets set`):
  #   LITESTREAM_REPLICA_BUCKET   — S3 bucket name (required to enable)
  #   LITESTREAM_REPLICA_PATH     — S3 prefix (default: motebit-sync)
  #   LITESTREAM_REPLICA_REGION   — AWS region (default: us-west-2)
  #   LITESTREAM_ACCESS_KEY_ID    — AWS access key
  #   LITESTREAM_SECRET_ACCESS_KEY — AWS secret key

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    interval = "15s"
    grace_period = "5s"
    method = "GET"
    path = "/health"
    protocol = "http"
    timeout = "2s"

[mounts]
  source = "motebit_data"
  destination = "/data"
