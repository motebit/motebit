# Staging / federation-peer-test instance of @motebit/api.
#
# Runs the same Docker image as the production motebit-sync (= relay.motebit.com).
# Purpose: a real second relay process at a real public URL so the federation
# handshake, heartbeat, peer suspension, and dispute orchestration can be
# exercised against prod across operator-grade infrastructure (TLS, real
# network, real DNS) — not just in-process tests or two local processes.
#
# Deploy:    fly deploy --config fly.staging.toml
# Status:    fly status --config fly.staging.toml
# Tail logs: fly logs --config fly.staging.toml
# Destroy:   fly apps destroy motebit-sync-stg
#
# This config intentionally does NOT enable litestream (ephemeral SQLite is
# fine for a federation peer-test instance — relay identity regenerates if
# the volume is wiped, and the only persistent state worth preserving is the
# peering record itself, which is a few hundred bytes).
app = "motebit-sync-stg"
primary_region = "sjc"
kill_signal = "SIGINT"
kill_timeout = 5

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  MOTEBIT_DB_PATH = "/data/motebit.db"
  # Federation: announce this relay at its public fly URL so peer relays
  # can route heartbeats and forwarded tasks back. Display name is what
  # shows up in the prod relay's federation/v1/peers list.
  MOTEBIT_FEDERATION_ENDPOINT_URL = "https://motebit-sync-stg.fly.dev"
  MOTEBIT_FEDERATION_DISPLAY_NAME = "motebit-sync-stg (federation peer test)"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    interval = "15s"
    grace_period = "5s"
    method = "GET"
    path = "/health"
    protocol = "http"
    timeout = "2s"

[mounts]
  source = "motebit_sync_stg_data"
  destination = "/data"
