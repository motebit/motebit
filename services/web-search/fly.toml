app = "motebit-web-search"
primary_region = "sjc"
kill_signal = "SIGINT"
kill_timeout = 5

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  MOTEBIT_PORT = "3200"
  MOTEBIT_DB_PATH = "/data/web-search.db"

[http_service]
  internal_port = 3200
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

  [[http_service.checks]]
    interval = "15s"
    grace_period = "10s"
    method = "GET"
    path = "/health"
    protocol = "http"
    timeout = "2s"

[mounts]
  source = "web_search_data"
  destination = "/data"
