version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    # Maturity gate (cooldown): don't open a PR until a release has been out long
    # enough to shake out .0 bugs and yanks; majors wait longest. The "let it
    # mature" behavior — does NOT delay security advisories, which still fire
    # immediately. Added after the long-tail major pileup (≈15 open PRs, mostly
    # bleeding-edge majors branched off stale main).
    cooldown:
      default-days: 7
      semver-minor-days: 7
      semver-major-days: 21
    # Grouping strategy: isolate blast radius.
    #
    # Crypto deps are security-critical — any compromise undermines the thesis,
    # so they land as their own PR that a human reviews with the noble/scure
    # release notes in hand.
    #
    # High-blast-radius ecosystem deps (TypeScript, @types/node, Vite, vitest
    # family, ESLint, jsdom) each get their own isolated group. A major bump
    # of any one of these typically requires tsconfig edits, type-cast
    # fallout, or config migration — bundling them turns a reviewable PR into
    # an unmergeable one. See PR #41 (9 simultaneous majors → CI wedge).
    #
    # The residual dev-major / production-major groups catch the long tail of
    # low-blast-radius majors (test helpers, a11y utilities, lint plugins) —
    # these may still be bundled since their combined risk is bounded.
    groups:
      # Security-critical crypto — never bundled
      crypto:
        patterns:
          - "@noble/*"
          - "@scure/*"

      # === High-blast-radius majors: each in their own group ===

      typescript:
        patterns:
          - "typescript"
          - "@typescript-eslint/*"

      types-node:
        patterns:
          - "@types/node"

      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "vite-plugin-*"

      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"

      eslint:
        patterns:
          - "eslint"

      jsdom:
        patterns:
          - "jsdom"

      hono:
        patterns:
          - "hono"
          - "@hono/*"

      # SDKs / 0.x libraries that ship breaking changes inside minor/patch
      # bumps — isolated so a large jump never wedges the routine batch. Two
      # offenders proven (2026-06-06): @anthropic-ai/sdk 0.52→0.101 rode the
      # production-minor-patch group straight onto the proxy/ai-core caching
      # path, and @ricky0123/vad-web dropped RealTimeVADOptions.stream in a
      # 0.0.x bump and red-wedged the whole group via apps/spatial's build.
      # Each now lands as its own reviewable PR.
      anthropic-sdk:
        patterns:
          - "@anthropic-ai/*"

      vad:
        patterns:
          - "@ricky0123/vad-web"

      # === Residual groups (long tail) ===

      dev-minor-patch:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
        exclude-patterns:
          - "@noble/*"
          - "@scure/*"
          - "typescript"
          - "@typescript-eslint/*"
          - "@types/node"
          - "vite"
          - "@vitejs/*"
          - "vite-plugin-*"
          - "vitest"
          - "@vitest/*"
          - "eslint"
          - "jsdom"
          - "hono"
          - "@hono/*"
          - "@anthropic-ai/*"
          - "@ricky0123/vad-web"

      dev-major:
        dependency-type: "development"
        update-types:
          - "major"
        exclude-patterns:
          - "@noble/*"
          - "@scure/*"
          - "typescript"
          - "@typescript-eslint/*"
          - "@types/node"
          - "vite"
          - "@vitejs/*"
          - "vite-plugin-*"
          - "vitest"
          - "@vitest/*"
          - "eslint"
          - "jsdom"
          - "hono"
          - "@hono/*"
          - "@anthropic-ai/*"
          - "@ricky0123/vad-web"

      production-minor-patch:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
        exclude-patterns:
          - "@noble/*"
          - "@scure/*"
          - "typescript"
          - "@typescript-eslint/*"
          - "@types/node"
          - "vite"
          - "@vitejs/*"
          - "vite-plugin-*"
          - "vitest"
          - "@vitest/*"
          - "eslint"
          - "jsdom"
          - "hono"
          - "@hono/*"
          - "@anthropic-ai/*"
          - "@ricky0123/vad-web"

      production-major:
        dependency-type: "production"
        update-types:
          - "major"
        exclude-patterns:
          - "@noble/*"
          - "@scure/*"
          - "typescript"
          - "@typescript-eslint/*"
          - "@types/node"
          - "vite"
          - "@vitejs/*"
          - "vite-plugin-*"
          - "vitest"
          - "@vitest/*"
          - "eslint"
          - "jsdom"
          - "hono"
          - "@hono/*"
          - "@anthropic-ai/*"
          - "@ricky0123/vad-web"

    open-pull-requests-limit: 10

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 5
      semver-major-days: 14
    open-pull-requests-limit: 5
