name: Publish to npm (manual)

# Manual fallback for publishing. Primary publish flow is release.yml (Changesets).
# Use this only if Changesets publish fails and you need to re-publish a tagged version.

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Perform a dry run (no actual publish)'
        required: false
        default: false
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22"
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Test published packages
        run: |
          pnpm --filter @motebit/sdk test
          pnpm --filter @motebit/verify test
          pnpm --filter create-motebit test
          pnpm --filter motebit test

      - name: Publish @motebit/sdk
        run: pnpm --filter @motebit/sdk publish --no-git-checks --provenance ${{ inputs.dry-run && '--dry-run' || '' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @motebit/verify
        run: pnpm --filter @motebit/verify publish --no-git-checks --provenance ${{ inputs.dry-run && '--dry-run' || '' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish create-motebit
        run: pnpm --filter create-motebit publish --no-git-checks --provenance ${{ inputs.dry-run && '--dry-run' || '' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish motebit CLI
        run: pnpm --filter motebit publish --no-git-checks --provenance ${{ inputs.dry-run && '--dry-run' || '' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Post-publish smoke test
        if: ${{ !inputs.dry-run }}
        env:
          MOTEBIT_PASSPHRASE: smoke-test-ci-passphrase
        run: |
          set -euo pipefail

          echo "Waiting for npm registry propagation..."
          sleep 10

          SMOKE_DIR=$(mktemp -d)
          echo "Running create-motebit in $SMOKE_DIR"
          cd "$SMOKE_DIR"
          npx create-motebit@latest test-agent --yes
          cd test-agent
          npm install
          node verify.js

          echo "Checking motebit CLI version..."
          npx motebit@latest --version

          echo "Smoke test passed."
