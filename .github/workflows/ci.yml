name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Turbo remote cache — restores build/typecheck/lint/lint:pack outputs for
# packages whose inputs haven't changed since the last passing run. Each
# job exports TURBO_TOKEN + TURBO_TEAM automatically via env inheritance.
# Secrets live in repo settings (TURBO_TOKEN) and repo variables (TURBO_TEAM);
# when absent the cache silently no-ops and CI falls back to local build,
# so forks / first-boot runs degrade gracefully.
env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit
        # `pnpm audit` (v9.15) hits npm's legacy `/security/audits` endpoint,
        # which npm intermittently 410/500/429-s as it pushes clients to the
        # bulk advisory endpoint. The real fix is pnpm PR #10652 (switches to
        # the quick endpoint with fallback) — merged 2026-02-19, only landed
        # in v11.0.0-alpha, not backported to v10.x or v9.x.
        # `--ignore-registry-errors` is the documented, intended workaround:
        # the audit still runs and reports findings, only the exit code is
        # tolerant of registry-side errors. Revisit when we upgrade pnpm or
        # the endpoint stabilises.
        run: pnpm audit --audit-level=critical --ignore-registry-errors

      - name: Build
        # Must run before drift defenses because check-api-surface shells out
        # to api-extractor, which reads from each package's dist/index.d.ts.
        run: pnpm build

      - name: Drift defenses (deps, specs, service/app primitives, API surface, changeset discipline)
        run: pnpm check

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Publish-integrity (publint + attw on every published package)
        # Validates that package.json `files`/`exports` match what's actually
        # shipped in dist/, and that TypeScript consumers can resolve types
        # under Node16/Bundler/etc. resolution modes. Catches dual-package-
        # hazard before it reaches npm.
        run: pnpm lint:pack

      - name: Dead code detection
        if: always()
        continue-on-error: true
        run: pnpm run check-unused

      - name: Test with coverage
        # --concurrency=4 matches the GitHub runner's CPU count. Turbo's
        # default concurrency=10 oversubscribes 4-core runners: each test
        # package spawns its own vitest worker pool, so 10 parallel packages
        # can balloon to 40+ competing workers and surface as timing-sensitive
        # test flakes. Cap it at the core count so vitest's per-package
        # parallelism doesn't collide with turbo's cross-package parallelism.
        #
        # Invoke turbo directly via `pnpm exec` rather than `pnpm run
        # test:coverage -- --concurrency=4`. The `--` form causes pnpm to
        # preserve `--` when forwarding to turbo, and turbo then treats `--`
        # as "pass everything after to the task," which routes --concurrency
        # into vitest (where it's an unknown option and fails the run).
        run: pnpm exec turbo run test:coverage --concurrency=4

      - name: Coverage summary
        if: always()
        run: node scripts/coverage-summary.mjs >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: coverage-reports
          path: |
            packages/*/coverage/
            apps/*/coverage/
            services/*/coverage/
          retention-days: 14

      - name: Upload build artifacts for E2E
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: web-build
          path: apps/web/dist/
          retention-days: 1

  format:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

  e2e:
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright (Chromium only)
        run: pnpm --filter @motebit/web exec playwright install --with-deps chromium

      - name: Download build artifacts
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4
        with:
          name: web-build
          path: apps/web/dist/

      - name: Run E2E smoke tests
        run: pnpm --filter @motebit/web test:e2e --project=chromium

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: e2e-screenshots
          path: apps/web/test-results/
          retention-days: 7

  gate-effectiveness:
    # Probe every drift-defense gate with a known-violating fixture to prove
    # each one actually fires. Scoped to scripts/* changes + pushes to main
    # so the expense (every gate runs under a perturbation) isn't paid on
    # unrelated PRs — but any change to a gate or the gate list triggers it.
    if: |
      github.event_name == 'push' ||
      contains(toJson(github.event.pull_request), 'scripts/')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        # The check-api-surface probe perturbs the committed baseline and
        # expects api-extractor to produce an etc/temp/ surface that diverges —
        # which requires dist/*.d.ts to exist for protocol/crypto/sdk. Without
        # this, the gate errors on missing input and the probe would pass for
        # the wrong reason.
        run: pnpm build

      - name: Prove every gate in GATES actually fires
        run: pnpm check-gates-effective

  sibling-audit:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sibling boundary audit
        run: git diff --name-only origin/main...HEAD | npx tsx scripts/check-sibling-boundaries.ts

  python-conformance:
    # Smoke-test that the Python reference implementation of
    # `motebit/device-self-registration@1.0` (examples/python-device-register/)
    # still works end-to-end against the TypeScript relay. Boots the relay in
    # the background, runs the Python client + conformance assertions on the
    # §5.2 response, captures both sides' output as artifacts.
    #
    # This is the load-bearing automation for motebit's protocol-portability
    # claim — without it, a spec change that introduces a TypeScript-specific
    # assumption would silently break the third-party-implementer pathway and
    # nobody would notice. The Python client running here is built against
    # the published spec alone (no motebit imports); a successful 201 + §5.2
    # response shape proves the spec is what the relay actually enforces.
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22"
          cache: "pnpm"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Python dependencies
        run: pip install --quiet --requirement examples/python-device-register/requirements.txt

      - name: Build relay and its workspace dependencies
        # services/api depends on workspace packages whose `main` points to
        # ./dist/index.js. Running `npx tsx services/api/src/server.ts`
        # without a prior build fails at module resolution because the dist/
        # outputs don't exist yet. Filter to `@motebit/api...` so we only
        # build the relay's transitive workspace deps, not the entire
        # monorepo.
        run: pnpm --filter @motebit/api... build

      - name: Boot relay in background
        # Minimal env: X402_PAY_TO_ADDRESS is the only required var; :memory:
        # DB keeps each CI run hermetic. server.ts is the executable boot
        # entry (index.ts is the library entry — side-effect-free at module
        # load so embedders can import without binding ports).
        env:
          PORT: "3199"
          X402_PAY_TO_ADDRESS: "0x0000000000000000000000000000000000000000"
          NODE_ENV: "development"
          MOTEBIT_DB_PATH: ":memory:"
        run: |
          npx tsx services/api/src/server.ts > /tmp/relay.out 2> /tmp/relay.err &
          echo $! > /tmp/relay.pid

      - name: Wait for /health
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3199/health > /dev/null 2>&1; then
              echo "relay healthy after ${i}s"
              curl -s http://localhost:3199/health
              echo
              exit 0
            fi
            sleep 1
          done
          echo "relay never became healthy; last log:"
          tail -n 50 /tmp/relay.out /tmp/relay.err
          exit 1

      - name: Run Python conformance test
        run: python examples/python-device-register/conformance_test.py http://localhost:3199

      - name: Capture relay log line for the success
        if: success()
        run: |
          echo "==== device.self_register.ok log line ===="
          grep "device.self_register.ok" /tmp/relay.out | tail -1 || echo "(not found)"

      - name: Tear down relay
        if: always()
        run: |
          if [ -f /tmp/relay.pid ]; then
            kill "$(cat /tmp/relay.pid)" 2>/dev/null || true
          fi

      - name: Upload relay logs
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: python-conformance-relay-logs
          path: |
            /tmp/relay.out
            /tmp/relay.err
          retention-days: 7

  python-receipt-verifier-conformance:
    # Smoke-test that the Python reference verifier for
    # `motebit/execution-ledger@1.0` §11 ExecutionReceipt
    # (examples/python-receipt-verifier/) still agrees with the TypeScript
    # relay's verifier on the JCS + Ed25519 + base64url envelope.
    #
    # Sibling to python-conformance: same boot recipe, different protocol
    # surface. This job is the load-bearing automation for the receipt
    # half of motebit's protocol-portability claim. The Python client signs
    # a fresh ExecutionReceipt with pynacl, posts it to the relay's
    # /agent/:motebitId/verify-receipt endpoint, and asserts on the body's
    # `valid` field — never on `response.ok` alone, per the dead-drop
    # lesson (memory/lesson_hardware_attestation_self_issued_dead_drop.md).
    # A successful pass means the spec is what the relay enforces; a failure
    # localizes the regression to §11.1 / §11.2 / §11.4 / §11.5.
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22"
          cache: "pnpm"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Python dependencies
        run: pip install --quiet --requirement examples/python-receipt-verifier/requirements.txt

      - name: Build relay and its workspace dependencies
        # See sibling python-conformance job for rationale; same boot recipe,
        # same tsx-resolves-dist requirement.
        run: pnpm --filter @motebit/api... build

      - name: Boot relay in background
        env:
          PORT: "3199"
          X402_PAY_TO_ADDRESS: "0x0000000000000000000000000000000000000000"
          NODE_ENV: "development"
          MOTEBIT_DB_PATH: ":memory:"
        run: |
          npx tsx services/api/src/server.ts > /tmp/relay.out 2> /tmp/relay.err &
          echo $! > /tmp/relay.pid

      - name: Wait for /health
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3199/health > /dev/null 2>&1; then
              echo "relay healthy after ${i}s"
              curl -s http://localhost:3199/health
              echo
              exit 0
            fi
            sleep 1
          done
          echo "relay never became healthy; last log:"
          tail -n 50 /tmp/relay.out /tmp/relay.err
          exit 1

      - name: Run Python receipt-verifier conformance test
        run: python examples/python-receipt-verifier/conformance_test.py http://localhost:3199

      - name: Verify the committed fixture offline
        # Sanity check: the fixture under fixtures/ must remain a valid receipt
        # any third-party Python verifier can re-verify without relay contact.
        # If a spec drift breaks this, the committed fixture would silently rot.
        run: python examples/python-receipt-verifier/verify.py examples/python-receipt-verifier/fixtures/example-receipt.json

      - name: Capture relay log lines for the round-trip
        if: success()
        run: |
          echo "==== device.self_register.ok log line (receipt-verifier registration) ===="
          grep "device.self_register.ok" /tmp/relay.out | tail -1 || echo "(not found)"
          echo "==== receipt.verified / receipt.verification_failed log lines ===="
          grep -E "receipt\.(verified|verification_failed)" /tmp/relay.out | tail -5 || echo "(not found)"

      - name: Tear down relay
        if: always()
        run: |
          if [ -f /tmp/relay.pid ]; then
            kill "$(cat /tmp/relay.pid)" 2>/dev/null || true
          fi

      - name: Upload relay logs
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: python-receipt-verifier-conformance-relay-logs
          path: |
            /tmp/relay.out
            /tmp/relay.err
          retention-days: 7

  changeset:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for changeset
        run: |
          # Count new changeset files (not README.md or config.json)
          CHANGESETS=$(git diff --name-only origin/main...HEAD -- '.changeset/*.md' | grep -v README.md | wc -l | tr -d ' ')
          if [ "$CHANGESETS" -eq "0" ]; then
            echo "::warning::No changeset found. If this PR affects published packages (@motebit/protocol, @motebit/sdk, @motebit/crypto, @motebit/verifier, create-motebit, motebit), run 'pnpm changeset' and commit the result."
          else
            echo "✓ Found $CHANGESETS changeset(s)"
          fi
