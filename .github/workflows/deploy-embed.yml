name: Deploy Embed Service

on:
  push:
    branches: [main]
    paths:
      - "services/embed/**"
      # No `packages/**` trigger: embed has zero @motebit/* dependencies
      # (only @xenova/transformers), so monorepo package changes cannot
      # affect its build. If this service ever imports a workspace package,
      # add `- "packages/**"` here — matching the sibling deploy-*.yml files.
  workflow_dispatch:

concurrency:
  group: deploy-embed-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master

      - name: Deploy to Fly.io
        run: flyctl deploy --config services/embed/fly.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
