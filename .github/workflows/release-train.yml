name: Release Train

# Locks the publish window. Every Tuesday at 23:00 UTC (≈ 4 p.m. PT,
# matching the late-afternoon Pacific cluster Anthropic's claude-code
# uses), find the open "Version Packages" PR — the one changesets/action
# maintains under refs/heads/changeset-release/main — and merge it. The
# resulting push to main fires release.yml, which sees no pending
# changesets and runs `changeset publish`.
#
# The discipline this workflow exists to enforce is captured in
# docs/doctrine/release-versioning.md § Cadence:
#
#   - One window per week. The page reads as a metronome, not a panic.
#   - If no Version Packages PR is open at the window, skip silently.
#     Cron-firing into nothing is correct behavior, not a failure.
#   - Bug found Wednesday afternoon? It rides next Tuesday's train.
#     Hotfix exception narrowly applies to security / data loss /
#     broken install / broken CLI, and ships via workflow_dispatch on
#     this same workflow — the named "I am breaking the cadence"
#     gesture, not an undeclared default.
#
# Why a separate workflow rather than a `schedule:` trigger on
# release.yml: single responsibility. release.yml's job is "react to
# changes on main" (open/update the Version Packages PR, or publish
# after merge). This workflow's job is "decide when to merge." Splitting
# them keeps each workflow's failure surface small and the intent
# obvious from the file name.

on:
  schedule:
    # cron is in UTC. 23:00 UTC = 4 p.m. PT (PDT) / 3 p.m. PT (PST).
    # Day-of-week 2 = Tuesday. GitHub scheduled workflows can run up
    # to ~15 min late under load — within a single release window
    # that is acceptable.
    - cron: "0 23 * * 2"
  # Manual trigger is the documented hotfix path. Invoking this outside
  # the scheduled window is the deliberate "I am breaking the cadence"
  # gesture; it should be paired with a clear reason in commit history
  # or a release-notes annotation. See doctrine for the four hotfix
  # categories (security / data loss / broken install / broken CLI).
  workflow_dispatch:
    inputs:
      reason:
        description: "Why this release is firing outside the Tuesday window"
        required: true
        type: choice
        options:
          - security
          - data-loss
          - broken-install
          - broken-cli
          - other-emergency

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

# Surfaced so the App-token step's `if` can gate on the App being configured.
# `secrets` can't be read in `if`, but `env` (which may reference secrets) can —
# mirrors release.yml's pattern.
env:
  RELEASE_APP_ID: ${{ secrets.APP_ID }}

jobs:
  merge-version-packages-pr:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write
    steps:
      # Mint a GitHub App installation token so the PR merge below is authored by
      # the App, not GITHUB_TOKEN. This is load-bearing: a merge pushed with
      # GITHUB_TOKEN does NOT trigger downstream workflows (GitHub's recursion
      # guard), so release.yml's publish step never fired and a merged release
      # sat unpublished on main (witnessed 2026-06-20: had to re-trigger the
      # publish with a manual empty commit). The App token's push DOES fire
      # release.yml. Gated + continue-on-error + the `app-token || GITHUB_TOKEN`
      # fallback below make this a no-op if the App is ever unconfigured (degrades
      # to the prior behavior, no error surfaced). Same step as release.yml.
      - name: Generate GitHub App token
        id: app-token
        if: env.RELEASE_APP_ID != ''
        continue-on-error: true
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Find the open Version Packages PR
        id: find
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # changesets/action pushes its draft to changeset-release/main.
          # Filtering by head branch is more precise than filtering by
          # title — a maintainer-renamed PR would still be found.
          PR=$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --head changeset-release/main \
            --state open \
            --json number,title,headRefName,mergeable \
            --jq '.[0]')

          if [ -z "$PR" ] || [ "$PR" = "null" ]; then
            echo "No open Version Packages PR — release window passes silently."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          NUM=$(echo "$PR" | jq -r .number)
          TITLE=$(echo "$PR" | jq -r .title)
          MERGEABLE=$(echo "$PR" | jq -r .mergeable)

          echo "Found PR #${NUM}: ${TITLE} (mergeable=${MERGEABLE})"
          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "number=${NUM}" >> "$GITHUB_OUTPUT"
          echo "mergeable=${MERGEABLE}" >> "$GITHUB_OUTPUT"

      - name: Skip — no PR
        if: steps.find.outputs.found == 'false'
        run: |
          echo "Release train fired with nothing to ship. This is the"
          echo "correct outcome when no changesets accumulated since the"
          echo "previous window. The doctrine prohibits manufacturing"
          echo "low-signal changesets to fill the slot."

      - name: Checkout for version comparison
        if: steps.find.outputs.found == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          # Need both main and changeset-release/main visible. Fetching
          # depth 0 is wasteful for a 5-min job; depth 1 with an explicit
          # follow-up fetch of changeset-release/main is enough.
          fetch-depth: 1

      - name: Refuse auto-merge on major version bumps
        # Locks the rule from docs/doctrine/release-versioning.md § Cadence:
        # "The scheduled train refuses to auto-merge a release containing
        # major bumps." Major releases must be deliberate human gestures
        # because npm versions are immutable — a phantom 2.0.0 burns a
        # number and triggers cascading consumer-coordination overhead
        # that a cron should never trigger autonomously.
        #
        # Comparing actual package.json values across the two refs is
        # more robust than parsing diff strings, per reviewer pass on
        # the safeguard design.
        if: steps.find.outputs.found == 'true'
        run: |
          set -euo pipefail
          git fetch --depth=1 origin changeset-release/main:refs/remotes/origin/changeset-release/main

          # Files the PR touched. Filter to package.json under the three
          # publish-eligible directory roots so workspace lockfiles or
          # other JSON files don't trip the check.
          CHANGED=$(git diff --name-only main..origin/changeset-release/main \
            -- 'packages/*/package.json' 'apps/*/package.json' 'services/*/package.json' || true)

          if [ -z "$CHANGED" ]; then
            echo "No published-package package.json files changed; safe to auto-merge."
            exit 0
          fi

          MAJOR_BUMPS=""
          while IFS= read -r f; do
            [ -z "$f" ] && continue

            # Read the post-bump file's full metadata in one git show.
            META=$(git show "origin/changeset-release/main:$f")
            PRIVATE=$(echo "$META" | jq -r '.private // false')
            NAME=$(echo "$META" | jq -r '.name // ""')
            NEW=$(echo "$META" | jq -r '.version // ""')

            # The doctrine governs **published** semver. Private workspace
            # packages don't ship to npm; their version field, if it
            # exists at all, has no consumer-facing meaning. Skip them
            # so a private app's version drift cannot block a release
            # train. The `.private` field is the authoritative signal —
            # check-deps already enforces that publishable packages
            # never carry `"private": true`.
            [ "$PRIVATE" = "true" ] && continue

            # Defensive: a malformed package.json with no name or no
            # version isn't something this gate is qualified to reason
            # about. Let it pass; other gates (publint, lint:pack)
            # catch malformed publish surfaces upstream.
            [ -z "$NAME" ] || [ "$NAME" = "null" ] && continue
            [ -z "$NEW" ] || [ "$NEW" = "null" ] && continue

            OLD=$(git show "main:$f" 2>/dev/null | jq -r '.version // empty' || true)

            # New file (no version on base) or version unchanged → skip.
            [ -z "$OLD" ] && continue
            [ "$OLD" = "$NEW" ] && continue

            OLD_MAJOR="${OLD%%.*}"
            NEW_MAJOR="${NEW%%.*}"

            if [ "$NEW_MAJOR" -gt "$OLD_MAJOR" ]; then
              MAJOR_BUMPS="${MAJOR_BUMPS}  ${NAME}: ${OLD} → ${NEW}"$'\n'
            fi
          done <<< "$CHANGED"

          if [ -n "$MAJOR_BUMPS" ]; then
            {
              echo "::error title=Major bump detected — auto-merge refused::"
              echo ""
              echo "Version Packages PR #${{ steps.find.outputs.number }} contains:"
              printf '%s' "$MAJOR_BUMPS"
              echo ""
              echo "Major releases are deliberate human acts, not cron-driven."
              echo "Resolution paths:"
              echo "  1. Accidental — fix the changeset on main, push correction,"
              echo "     wait for next Tuesday's window."
              echo "  2. Intentional — merge manually with a named migration path:"
              echo "       gh pr merge ${{ steps.find.outputs.number }} --squash --delete-branch"
              echo "  3. Out-of-window emergency major — workflow_dispatch this"
              echo "     same workflow with reason=other-emergency and a recorded"
              echo "     justification in the run notes."
            } >&2
            exit 1
          fi

          echo "No major bumps detected; proceeding to auto-merge."

      - name: Merge the PR
        if: steps.find.outputs.found == 'true'
        # App token (when configured) so the merge push triggers release.yml's
        # publish; falls back to GITHUB_TOKEN (which won't trigger it — the gap
        # this fixes) only if the App is unset.
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PR="${{ steps.find.outputs.number }}"
          MERGEABLE="${{ steps.find.outputs.mergeable }}"

          if [ "$MERGEABLE" != "MERGEABLE" ]; then
            echo "PR #${PR} is not mergeable (state: ${MERGEABLE})."
            echo "Resolve conflicts manually and re-run via workflow_dispatch,"
            echo "or wait for next Tuesday's window."
            exit 1
          fi

          # --squash matches the project's branch protection policy and
          # keeps the main-branch commit history reading as one release =
          # one commit, which is what the npm version page mirrors.
          gh pr merge "$PR" \
            --repo "$GITHUB_REPOSITORY" \
            --squash \
            --delete-branch
          echo "Merged PR #${PR}. release.yml will fire on the resulting"
          echo "push to main and publish to npm."

      - name: Annotate hotfix runs
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "::notice title=Out-of-window release::Reason: ${{ inputs.reason }}"
