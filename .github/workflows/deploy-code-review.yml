name: Deploy Code Review Service

on:
  push:
    branches: [main]
    paths:
      - "services/code-review/**"
      - "packages/**"
  workflow_dispatch:

concurrency:
  group: deploy-code-review-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: superfly/flyctl-actions/setup-flyctl@63da3ecc5e2793b98a3f2519b3d75d4f4c11cec2 # master

      # The service self-bootstraps its identity from the persistent /data
      # volume on first boot — no out-of-band ceremony. Required one-time
      # setup before the first deploy:
      #   fly apps create motebit-code-review
      #   fly volumes create code_review_data --size 1 --region sjc
      #   fly secrets set ANTHROPIC_API_KEY=... GITHUB_TOKEN=... \
      #                   MOTEBIT_SYNC_URL=... MOTEBIT_API_TOKEN=...
      - name: Deploy to Fly.io
        run: flyctl deploy --config services/code-review/fly.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
