name: Deploy Web Search Service

on:
  push:
    branches: [main]
    paths:
      - "services/web-search/**"
      - "packages/**"
  workflow_dispatch:

concurrency:
  group: deploy-web-search-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master

      - name: Deploy to Fly.io
        run: flyctl deploy --config services/web-search/fly.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
