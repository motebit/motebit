name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    if: |
      (github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA' ||
       github.event_name == 'pull_request_target')
    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08 # v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: "signatures/cla.json"
          path-to-document: "https://github.com/motebit/motebit/blob/main/CLA.md"
          branch: "main"
          allowlist: dependabot[bot],renovate[bot],github-actions[bot],hakimlabs
          custom-notsigned-prcomment: |
            Thank you for your contribution! Before we can merge this, you need to sign our [Contributor License Agreement](https://github.com/motebit/motebit/blob/main/CLA.md).

            To sign, please comment on this PR with:

            > I have read the CLA Document and I hereby sign the CLA

            This is a one-time process. Once signed, all future contributions are covered.
          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA"
