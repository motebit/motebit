name: Release Desktop

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ""
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ""

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Build Tauri app
        working-directory: apps/desktop
        run: pnpm tauri build ${{ matrix.args }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.target }}
          path: apps/desktop/src-tauri/target/**/release/bundle/**/*.{dmg,app,deb,AppImage,rpm,msi,exe}
          if-no-files-found: warn

      - name: Upload artifacts (flat search)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-bundles-${{ matrix.target }}
          path: |
            apps/desktop/src-tauri/target/release/bundle/
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/
          if-no-files-found: warn

  create-release:
    needs: build-tauri
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="desktop-v0.1.0"
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "Motebit Desktop v0.1.0" \
            --notes "Desktop app binaries. macOS builds are unsigned — right-click → Open on first launch." \
            --draft \
            artifacts/**/* 2>/dev/null || \
          gh release upload "$TAG" \
            --repo "${{ github.repository }}" \
            --clobber \
            artifacts/**/* 2>/dev/null || true
