name: Deploy CORS Proxy

on:
  push:
    branches: [main]
    paths:
      - "services/proxy/**"
      # No `packages/**` trigger: proxy has zero @motebit/* dependencies
      # (only @noble/ed25519, next, react, @vercel/kv), so monorepo package
      # changes cannot affect its build. If this service ever imports a
      # workspace package, add `- "packages/**"` here.
  workflow_dispatch:

concurrency:
  group: deploy-proxy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production-proxy

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        run: vercel --prod --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
