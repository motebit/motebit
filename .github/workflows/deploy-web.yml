# Deploy web app (apps/web/) to Vercel
#
# Required secrets:
#   VERCEL_TOKEN      — Vercel personal access token (Settings > Tokens)
#   VERCEL_ORG_ID     — Vercel org/team ID (found in .vercel/project.json or Vercel dashboard)
#   VERCEL_PROJECT_ID — Vercel project ID (found in .vercel/project.json or Vercel dashboard)

name: Deploy Web

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/sdk/**"
      - "packages/runtime/**"
      - "packages/ai-core/**"
      - "packages/render-engine/**"
      - "packages/behavior-engine/**"
      - "packages/state-vector/**"
      - "packages/browser-persistence/**"
      - "packages/core-identity/**"
      - "packages/crypto/**"
      - "packages/mcp-client/**"
      - "packages/planner/**"
      - "packages/policy-invariants/**"
      - "packages/sync-engine/**"
      - "packages/tools/**"
  workflow_dispatch:

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm --filter @motebit/web build

      - name: Install Vercel CLI
        run: pnpm add -g vercel

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/web
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel (production)
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/web
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
