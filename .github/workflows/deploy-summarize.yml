name: Deploy Summarize Service

on:
  push:
    branches: [main]
    paths:
      - "services/summarize/**"
      - "packages/**"
  workflow_dispatch:

concurrency:
  group: deploy-summarize-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: superfly/flyctl-actions/setup-flyctl@63da3ecc5e2793b98a3f2519b3d75d4f4c11cec2 # master

      # Graceful bootstrap: check whether the Fly app exists before deploying.
      # If it doesn't, the job annotates and exits green instead of failing —
      # the moment `fly apps create motebit-summarize` runs, the next push
      # auto-deploys without needing to touch this workflow.
      - name: Check if Fly app exists
        id: fly_app
        run: |
          if flyctl status --app motebit-summarize > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Fly app not created::motebit-summarize does not exist on Fly.io. Skipping deploy. Run 'fly apps create motebit-summarize' + set MOTEBIT_PRIVATE_KEY_HEX, MOTEBIT_SYNC_URL, WEB_SEARCH_URL secrets to enable auto-deploy."
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy to Fly.io
        if: steps.fly_app.outputs.exists == 'true'
        run: flyctl deploy --config services/summarize/fly.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
