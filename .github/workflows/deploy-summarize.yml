name: Deploy Summarize Service

on:
  push:
    branches: [main]
    paths:
      - "services/summarize/**"
      - "packages/**"
  workflow_dispatch:

concurrency:
  group: deploy-summarize-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master

      # The service self-bootstraps its identity from the persistent /data
      # volume on first boot — no out-of-band ceremony. Required one-time
      # setup before the first deploy:
      #   fly apps create motebit-summarize
      #   fly volumes create summarize_data --size 1 --region sjc
      #   fly secrets set MOTEBIT_SYNC_URL=... MOTEBIT_API_TOKEN=... \
      #                   WEB_SEARCH_URL=...
      - name: Deploy to Fly.io
        run: flyctl deploy --config services/summarize/fly.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
