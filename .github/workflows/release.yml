name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

# Turbo remote cache — restores build outputs for packages whose inputs
# haven't changed since the last passing run. Silently no-ops when the
# secrets aren't set.
env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Test published packages
        run: |
          pnpm --filter @motebit/protocol test
          pnpm --filter @motebit/sdk test
          pnpm --filter @motebit/crypto test
          pnpm --filter @motebit/verifier test
          pnpm --filter create-motebit test
          pnpm --filter motebit test

      # ── Pre-publish smoke test ─────────────────────────────────────
      # Runs the locally-built `create-motebit` against a tmp dir and
      # asserts its scaffold-emitted package.json pins versions that
      # actually satisfy the workspace packages we're about to publish.
      # This catches the misnamed-constant class of bug at PR / pre-
      # publish time instead of after a broken artifact reaches npm.
      #
      # History: `create-motebit@1.1.0` shipped publicly on 2026-04-27
      # with a misnamed `__VERIFY_VERSION__` tsup constant that read
      # `@motebit/crypto`'s version and was reused to pin three packages
      # on different cadences. The post-publish smoke test caught the
      # symptom — but only after the broken artifact had already
      # shipped. Moving the smoke check pre-publish + the static
      # `check-tsup-define-conventions` gate (#53) close that timing
      # window. See docs/drift-defenses.md §53.
      - name: Pre-publish smoke (scaffold pin verification)
        env:
          MOTEBIT_PASSPHRASE: smoke-test-ci-passphrase
        run: |
          set -euo pipefail

          SMOKE_DIR=$(mktemp -d)
          export MOTEBIT_CONFIG_DIR="$SMOKE_DIR/.motebit"
          cd "$SMOKE_DIR"

          # Run the locally-built scaffold (NOT npx@latest — those are
          # the previously-published versions which can't catch a bug
          # in the about-to-publish version).
          echo "Running locally-built create-motebit --agent..."
          node "$GITHUB_WORKSPACE/packages/create-motebit/dist/index.js" \
            test-runnable-agent --agent --yes

          cd test-runnable-agent
          # Assert the scaffold's pinned versions satisfy the workspace
          # versions the publish step is about to ship. Reads each
          # workspace package.json, compares against the scaffold's
          # pin. A mismatch fails before publish.
          node -e "
            const fs = require('node:fs');
            const path = require('node:path');
            const ws = process.env.GITHUB_WORKSPACE;
            const generated = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const checks = [
              ['@motebit/sdk', 'packages/sdk/package.json'],
              ['motebit', 'apps/cli/package.json'],
            ];
            let failed = false;
            for (const [dep, src] of checks) {
              const expected = JSON.parse(fs.readFileSync(path.join(ws, src), 'utf8')).version;
              const actual = generated.dependencies[dep];
              const expectedRange = '^' + expected;
              if (actual !== expectedRange) {
                console.error('FAIL:', dep, 'pinned at', actual, '— workspace is at', expected, '(expected pin', expectedRange + ')');
                failed = true;
              } else {
                console.log('OK:', dep, '=', actual);
              }
            }
            if (failed) process.exit(1);
          "

      # Skip the changesets/action when no releases would actually happen.
      # Every changeset that targets only `ignore`-listed (private)
      # packages produces a `releases: []` status — `changesets/action`
      # then force-pushes an empty diff to `changeset-release/main` and
      # the PR-create step fails with `No commits between main and
      # changeset-release/main`. The guard reads the JSON `releases`
      # array directly, since `changeset status` exits 0 even when
      # nothing bumps.
      - name: Detect publishable releases
        id: pending
        run: |
          pnpm changeset status --output=/tmp/cs-status.json
          COUNT=$(jq '.releases | length' /tmp/cs-status.json)
          echo "publishable=$COUNT" >> "$GITHUB_OUTPUT"
          if [ "$COUNT" = "0" ]; then
            echo "No publishable changesets pending — every queued changeset targets ignore-listed packages. Skipping the changesets/action step."
          else
            echo "$COUNT publishable release(s) pending."
            jq '.releases[] | "  - \(.name) → \(.type)"' /tmp/cs-status.json
          fi

      # When .changeset/ has pending changesets for non-ignored packages:
      # creates/updates a "Version Packages" PR. When that PR is merged
      # (no changesets left): publishes to npm + creates GitHub releases.
      - name: Create release PR or publish
        id: changesets
        if: steps.pending.outputs.publishable != '0'
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          title: "Version Packages"
          commit: "Version Packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Post-publish smoke test (registry propagation)
        if: steps.changesets.outputs.published == 'true'
        env:
          MOTEBIT_PASSPHRASE: smoke-test-ci-passphrase
        run: |
          set -euo pipefail

          echo "Waiting for npm registry propagation..."
          sleep 10

          # ── Default scaffold (identity-only) — exercises the published artifact ──
          SMOKE_DIR=$(mktemp -d)
          echo "Running create-motebit@latest (default scaffold) in $SMOKE_DIR"
          cd "$SMOKE_DIR"
          export MOTEBIT_CONFIG_DIR="$SMOKE_DIR/.motebit"
          npx create-motebit@latest test-agent --yes
          cd test-agent
          npm install
          node verify.js

          echo "Checking motebit CLI version..."
          npx motebit@latest --version

          # ── Agent scaffold (runnable) — catches @types/node + main-module-guard regressions ──
          AGENT_DIR=$(mktemp -d)
          echo "Running create-motebit@latest --agent in $AGENT_DIR"
          cd "$AGENT_DIR"
          export MOTEBIT_CONFIG_DIR="$AGENT_DIR/.motebit"
          npx create-motebit@latest test-runnable-agent --agent --yes
          cd test-runnable-agent
          npm install --no-audit --no-fund
          npm run build
          node -e "import('./dist/index.js').then(m => { if (!Array.isArray(m.default) || m.default.length === 0) { console.error('agent import returned no tools'); process.exit(1); } console.log('agent imports clean,', m.default.length, 'tools exported'); }).catch(e => { console.error('agent import failed:', e.message); process.exit(1); })"

          echo "Smoke tests passed."
