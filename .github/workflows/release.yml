name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Test published packages
        run: |
          pnpm --filter @motebit/protocol test
          pnpm --filter @motebit/sdk test
          pnpm --filter @motebit/verify test
          pnpm --filter create-motebit test
          pnpm --filter motebit test

      # When .changeset/ has pending changesets: creates/updates a "Version Packages" PR
      # When that PR is merged (no changesets left): publishes to npm + creates GitHub releases
      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          title: "Version Packages"
          commit: "Version Packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Post-publish smoke test
        if: steps.changesets.outputs.published == 'true'
        env:
          MOTEBIT_PASSPHRASE: smoke-test-ci-passphrase
        run: |
          set -euo pipefail

          echo "Waiting for npm registry propagation..."
          sleep 10

          SMOKE_DIR=$(mktemp -d)
          echo "Running create-motebit in $SMOKE_DIR"
          cd "$SMOKE_DIR"
          npx create-motebit@latest test-agent --yes
          cd test-agent
          npm install
          node verify.js

          echo "Checking motebit CLI version..."
          npx motebit@latest --version

          echo "Smoke test passed."
