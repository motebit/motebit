name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

# Turbo remote cache — restores build outputs for packages whose inputs
# haven't changed since the last passing run. Silently no-ops when the
# secrets aren't set.
env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}
  # Surfaced so a step-level `if` can gate the GitHub App token step on the
  # App actually being configured. `secrets` can't be read in `if`, but `env`
  # (which may reference secrets) can — so this maps the secret's presence
  # into the `env` context the conditional can see.
  RELEASE_APP_ID: ${{ secrets.APP_ID }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      # Durable release token — mint a short-lived GitHub App installation
      # token at runtime instead of a yearly-expiring fine-grained PAT
      # (CHANGESETS_TOKEN). Activate by creating a GitHub App with Contents +
      # Pull-requests write, installing it on this repo, and setting repo
      # secrets APP_ID + APP_PRIVATE_KEY. `continue-on-error` + the
      # `app-token || GITHUB_TOKEN` fallback chain below make this a NO-OP
      # until those secrets exist (falls back to the prior GITHUB_TOKEN
      # behavior), so it ships safely ahead of setup. It retires the
      # expired-prone CHANGESETS_TOKEN — that secret is deliberately dropped
      # from the chain because an expired-but-present PAT would be selected by
      # `||` (non-empty) and break checkout. The App token (unlike GITHUB_TOKEN) authors the
      # Version-Packages PR + pushes tags AND lets the PR's required checks run
      # without the action_required gate — replacing the manual PAT renewal.
      # Gated on the App being configured. Without `if`, this step throws a red
      # `##[error]` annotation on every release ("'client-id'/'app-id' must be
      # non-empty") while `APP_ID`/`APP_PRIVATE_KEY` are unset — alarming noise
      # on a step that is a deliberate no-op until then. The `if` makes it
      # cleanly absent (its outputs empty) so the `app-token || GITHUB_TOKEN`
      # fallback chain below selects GITHUB_TOKEN with no error surfaced.
      - name: Generate GitHub App token
        id: app-token
        if: env.RELEASE_APP_ID != ''
        continue-on-error: true
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      # Checkout with the release token so the persisted git credentials the
      # direct-publish step pushes tags with are the App token (when set),
      # not the default GITHUB_TOKEN — the App token's pushes fire downstream
      # workflows where GITHUB_TOKEN's don't.
      #
      # NB: an earlier revision blamed the unpushed-tags bug on this token
      # choice. That was a misdiagnosis — the 2026-06-06T12:23 release ran
      # GITHUB_TOKEN on *both* checkout and env and tags still didn't push.
      # The real causes were the shallow clone and bulk `git push --tags`
      # (fixed via fetch-depth: 0 below + per-tag push in direct-publish).
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          # Full history + all tags. changesets/action requires this, and its
          # absence is why tag pushing broke: in the default shallow clone
          # `git push origin --tags` reported "Everything up-to-date" and pushed
          # nothing, so every GitHub Release was skipped by its `--verify-tag`.
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Test published packages
        run: |
          pnpm --filter @motebit/protocol test
          pnpm --filter @motebit/sdk test
          pnpm --filter @motebit/crypto test
          pnpm --filter @motebit/verifier test
          pnpm --filter create-motebit test
          pnpm --filter motebit test

      # ── Pre-publish smoke test ─────────────────────────────────────
      # Runs the locally-built `create-motebit` against a tmp dir and
      # asserts its scaffold-emitted package.json pins versions that
      # actually satisfy the workspace packages we're about to publish.
      # This catches the misnamed-constant class of bug at PR / pre-
      # publish time instead of after a broken artifact reaches npm.
      #
      # History: `create-motebit@1.1.0` shipped publicly on 2026-04-27
      # with a misnamed `__VERIFY_VERSION__` tsup constant that read
      # `@motebit/crypto`'s version and was reused to pin three packages
      # on different cadences. The post-publish smoke test caught the
      # symptom — but only after the broken artifact had already
      # shipped. Moving the smoke check pre-publish + the static
      # `check-tsup-define-conventions` gate (#53) close that timing
      # window. See docs/drift-defenses.md §53.
      - name: Pre-publish smoke (scaffold pin verification)
        env:
          MOTEBIT_PASSPHRASE: smoke-test-ci-passphrase
        run: |
          set -euo pipefail

          SMOKE_DIR=$(mktemp -d)
          export MOTEBIT_CONFIG_DIR="$SMOKE_DIR/.motebit"
          cd "$SMOKE_DIR"

          # Run the locally-built scaffold (NOT npx@latest — those are
          # the previously-published versions which can't catch a bug
          # in the about-to-publish version).
          echo "Running locally-built create-motebit --agent..."
          node "$GITHUB_WORKSPACE/packages/create-motebit/dist/index.js" \
            test-runnable-agent --agent --yes

          cd test-runnable-agent
          # Assert the scaffold's pinned versions satisfy the workspace
          # versions the publish step is about to ship. Reads each
          # workspace package.json, compares against the scaffold's
          # pin. A mismatch fails before publish.
          node -e "
            const fs = require('node:fs');
            const path = require('node:path');
            const ws = process.env.GITHUB_WORKSPACE;
            const generated = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const checks = [
              ['@motebit/sdk', 'packages/sdk/package.json'],
              ['motebit', 'apps/cli/package.json'],
            ];
            let failed = false;
            for (const [dep, src] of checks) {
              const expected = JSON.parse(fs.readFileSync(path.join(ws, src), 'utf8')).version;
              const actual = generated.dependencies[dep];
              const expectedRange = '^' + expected;
              if (actual !== expectedRange) {
                console.error('FAIL:', dep, 'pinned at', actual, '— workspace is at', expected, '(expected pin', expectedRange + ')');
                failed = true;
              } else {
                console.log('OK:', dep, '=', actual);
              }
            }
            if (failed) process.exit(1);
          "

      # Determine whether the changesets/action can safely run.
      # Three states matter:
      #   1. Pending non-ignore-listed changesets → action runs in
      #      VERSION mode, creates/updates "Version Packages" PR.
      #   2. No `.changeset/*.md` files at all (post-merge state) →
      #      action runs in PUBLISH mode, ships any workspace package
      #      whose package.json version exceeds npm's, AND pushes git
      #      tags + creates GitHub releases.
      #   3. Pending changesets but ALL target ignore-listed packages →
      #      `changeset status` returns `releases: []` and the action
      #      then force-pushes an empty diff to `changeset-release/main`,
      #      hitting "No commits between main and changeset-release/main".
      #      This is the buggy short-circuit we have to skip.
      #
      # Earlier this guard checked `releases.length > 0`, which conflated
      # state 2 with state 3 — every post-merge run that should have
      # auto-tagged + auto-released was silently routed to the
      # belt-and-suspenders direct-publish step instead, which only
      # publishes to npm and never pushes tags. Fix: distinguish state 2
      # from state 3 by counting both pending changeset files AND the
      # action's reported releases.
      - name: Detect publishable releases
        id: pending
        run: |
          pnpm changeset status --output=/tmp/cs-status.json
          RELEASES=$(jq '.releases | length' /tmp/cs-status.json)
          PENDING_FILES=$(find .changeset -maxdepth 1 -name '*.md' -not -name 'README.md' 2>/dev/null | wc -l | tr -d ' ')
          if [ "$RELEASES" -gt 0 ]; then
            STATE="version-mode"
            echo "$RELEASES publishable release(s) pending — action will run in version mode."
            jq -r '.releases[] | "  - \(.name) → \(.type)"' /tmp/cs-status.json
          elif [ "$PENDING_FILES" = "0" ]; then
            STATE="publish-mode"
            echo "No pending changeset files — action will run in publish mode (will ship + tag + release any workspace package ahead of npm)."
          else
            STATE="skip"
            echo "$PENDING_FILES pending changeset file(s) but every release targets an ignore-listed package — skipping action to avoid the empty-diff force-push bug."
          fi
          echo "state=$STATE" >> "$GITHUB_OUTPUT"

      # State 1 (pending non-ignored changesets): version mode → updates
      # the "Version Packages" PR.
      # State 2 (no pending changesets, post-merge): publish mode → ships
      # to npm, pushes git tags, creates GitHub releases via the
      # GITHUB_TOKEN-authorized release-creation step the action does
      # internally.
      # State 3 (all-ignored): skipped — direct-publish handles it
      # below as a no-op (workspace versions match npm).
      # Token selection (App token || GITHUB_TOKEN). Preferred: the GitHub
      # App installation token from the step above (durable — no expiry,
      # replaces the yearly-expiring CHANGESETS_TOKEN PAT). Fallback:
      # GITHUB_TOKEN (the prior behavior — works, but its PRs hit the
      # action_required gate and its pushes don't fire downstream workflows).
      # With the App token the Version Packages PR is authored by a
      # non-github-actions[bot] identity, so CI on that PR fires
      # without GitHub's `action_required` approval gate, which the
      # default GITHUB_TOKEN-authored PRs trigger to prevent recursive
      # workflow exploits. Without the PAT, the Version Packages PR
      # sits BLOCKED in branch protection forever because the 6
      # required status checks never get a chance to run.
      #
      # Witnessed failure: 2026-05-04 PR #91 sat unmerged for 9 days;
      # release-train.yml's auto-merge step exited non-zero each
      # Tuesday (2026-05-05, 2026-05-12) because the PR's checks were
      # `action_required` with 0s duration. Diagnosed 2026-05-13.
      #
      # Fallback to GITHUB_TOKEN keeps forks and pre-App-setup boots
      # working — same graceful-degradation pattern the TURBO_TOKEN
      # block above uses. The fallback path still has the
      # action_required gate; configuring the GitHub App (APP_ID +
      # APP_PRIVATE_KEY) is what removes it.
      - name: Create release PR or publish (with tags + GitHub releases)
        id: changesets
        if: steps.pending.outputs.state != 'skip'
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          title: "Version Packages"
          commit: "Version Packages"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      # Fires in state 3 (all-ignored changesets accumulating), which is the
      # repo's STEADY state: the `ignore` list holds changesets for private
      # packages indefinitely, so `changeset status` reports `releases: []`
      # while leftover `.changeset/*.md` files persist — every release after a
      # Version-Packages merge lands here, not in the action above.
      #
      # It is therefore NOT a no-op: when a Version-Packages merge bumped a
      # published package's version, `changeset publish` ships it to npm here.
      # The action's publish-mode niceties (push git tags + create GitHub
      # Releases) do not run, so this step reproduces them: `changeset publish`
      # creates local tags, we push them, and we open a GitHub Release per new
      # tag. Fault-tolerant by design — a tag/release hiccup must never fail an
      # npm publish that already succeeded (it's irreversible). Idempotent on
      # re-run: already-published packages are skipped, pushed tags are no-ops,
      # and existing releases are tolerated.
      - name: Direct publish (publishes ignored-state leftovers + pushes tags + GitHub Releases)
        id: direct_publish
        if: steps.pending.outputs.state == 'skip'
        run: |
          set -euo pipefail
          OUTPUT=$(pnpm release 2>&1 | tee /dev/stderr)
          if echo "$OUTPUT" | grep -qE "(New tag|Publishing)"; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            # changeset publish created local git tags for each published
            # package — push them so every published version is traceable.
            # Push tags + cut a GitHub Release per published package, one tag at
            # a time. Bulk `git push origin --tags` silently no-op'd in CI
            # ("Everything up-to-date" → nothing pushed → every `--verify-tag`
            # release skipped); an explicit `refs/tags/<tag>` push is
            # unambiguous and fails loudly if it can't. `git tag "$TAG"`
            # re-tags HEAD as a belt-and-suspenders no-op should changeset's own
            # tag not have stuck. `--verify-tag` is dropped — the tag is pushed
            # immediately above, so the release is cut from it; a release is
            # never allowed to fail the (irreversible) npm publish.
            echo "$OUTPUT" | grep -oE "New tag:[[:space:]]+[^[:space:]]+" | awk '{print $NF}' | while read -r TAG; do
              [ -n "$TAG" ] || continue
              git tag "$TAG" 2>/dev/null || true
              git push origin "refs/tags/$TAG" || echo "::warning::tag push failed for $TAG"
              # Inline this version's CHANGELOG section so the GitHub Release
              # shows what actually changed, not a stub. Fully fault-tolerant:
              # a tag is `@motebit/<name>@<ver>`; resolve the package dir from
              # its package.json name, slice the `## <ver>` section out of its
              # CHANGELOG.md, and fall back to the generic note on any miss —
              # a release body must never fail the (irreversible) npm publish.
              PKG="${TAG%@*}"; VER="${TAG##*@}"
              DIR=$(grep -rl "\"name\": \"$PKG\"" --include=package.json packages apps services 2>/dev/null | head -1 | xargs -r dirname || true)
              NOTES=""
              if [ -n "$DIR" ] && [ -f "$DIR/CHANGELOG.md" ]; then
                NOTES=$(awk -v v="## $VER" '$0==v{f=1;next} /^## /{if(f)exit} f{print}' "$DIR/CHANGELOG.md" || true)
              fi
              [ -n "$NOTES" ] || NOTES="Automated release of \`$TAG\`. See the package's CHANGELOG.md for details."
              gh release create "$TAG" --title "$TAG" --notes "$NOTES" \
                || echo "::warning::GitHub Release for $TAG skipped (may already exist)"
            done || true
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "Nothing to publish — every workspace package.json matches npm."
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}

      # Poll npm until every publishable workspace package's package.json
      # version is visible on the registry. Replaces a fixed `sleep 10`
      # that lost the race twice during the v1.2 cut: smoke ran before
      # npm's metadata index showed the just-published version, so
      # `npx create-motebit@latest` → `npm install` resolved to the
      # previous (broken) version of @motebit/crypto. Per-package poll
      # for up to 90s; already-published packages return immediately.
      - name: Wait for npm registry propagation
        if: steps.changesets.outputs.published == 'true' || steps.direct_publish.outputs.published == 'true'
        run: npx tsx scripts/wait-for-npm-propagation.ts

      - name: Post-publish smoke test (scaffold + CLI exercise)
        if: steps.changesets.outputs.published == 'true' || steps.direct_publish.outputs.published == 'true'
        env:
          MOTEBIT_PASSPHRASE: smoke-test-ci-passphrase
        run: |
          set -euo pipefail

          # ── Default scaffold (identity-only) — exercises the published artifact ──
          SMOKE_DIR=$(mktemp -d)
          echo "Running create-motebit@latest (default scaffold) in $SMOKE_DIR"
          cd "$SMOKE_DIR"
          export MOTEBIT_CONFIG_DIR="$SMOKE_DIR/.motebit"
          npx create-motebit@latest test-agent --yes
          cd test-agent
          npm install
          node verify.js

          echo "Checking motebit CLI version..."
          npx motebit@latest --version

          # ── Agent scaffold (runnable) — catches @types/node + main-module-guard regressions ──
          AGENT_DIR=$(mktemp -d)
          echo "Running create-motebit@latest --agent in $AGENT_DIR"
          cd "$AGENT_DIR"
          export MOTEBIT_CONFIG_DIR="$AGENT_DIR/.motebit"
          npx create-motebit@latest test-runnable-agent --agent --yes
          cd test-runnable-agent
          npm install --no-audit --no-fund
          npm run build
          node -e "import('./dist/index.js').then(m => { if (!Array.isArray(m.default) || m.default.length === 0) { console.error('agent import returned no tools'); process.exit(1); } console.log('agent imports clean,', m.default.length, 'tools exported'); }).catch(e => { console.error('agent import failed:', e.message); process.exit(1); })"

          echo "Smoke tests passed."
