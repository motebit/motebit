name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

# Turbo remote cache — restores build outputs for packages whose inputs
# haven't changed since the last passing run. Silently no-ops when the
# secrets aren't set.
env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Test published packages
        run: |
          pnpm --filter @motebit/protocol test
          pnpm --filter @motebit/sdk test
          pnpm --filter @motebit/crypto test
          pnpm --filter @motebit/verifier test
          pnpm --filter create-motebit test
          pnpm --filter motebit test

      # When .changeset/ has pending changesets: creates/updates a "Version Packages" PR
      # When that PR is merged (no changesets left): publishes to npm + creates GitHub releases
      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          title: "Version Packages"
          commit: "Version Packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Post-publish smoke test
        if: steps.changesets.outputs.published == 'true'
        env:
          MOTEBIT_PASSPHRASE: smoke-test-ci-passphrase
        run: |
          set -euo pipefail

          echo "Waiting for npm registry propagation..."
          sleep 10

          # ── Default scaffold (identity-only) ───────────────────────────
          # The path most users hit first. Verifies create-motebit can
          # mint an identity, the example verify.js works against it, and
          # the motebit CLI can announce its version.
          SMOKE_DIR=$(mktemp -d)
          echo "Running create-motebit (default scaffold) in $SMOKE_DIR"
          cd "$SMOKE_DIR"
          export MOTEBIT_CONFIG_DIR="$SMOKE_DIR/.motebit"
          npx create-motebit@latest test-agent --yes
          cd test-agent
          npm install
          node verify.js

          echo "Checking motebit CLI version..."
          npx motebit@latest --version

          # ── Agent scaffold (runnable) ──────────────────────────────────
          # The path users hit when actually deploying an agent. Two
          # regressions on 2026-04-25 prove this needs its own gate:
          #   1. Missing @types/node → tsc fails immediately (TS2307 on
          #      node:fs / node:path / node:child_process).
          #   2. Missing main-module guard → the entrypoint's spawn block
          #      fires when motebit serve re-imports it for tools, looping
          #      forever.
          # Both reproduce 100% on every install, both were silent in CI
          # because the default-scaffold smoke above never compiles or
          # imports the runnable entrypoint.
          AGENT_DIR=$(mktemp -d)
          echo "Running create-motebit --agent in $AGENT_DIR"
          cd "$AGENT_DIR"
          export MOTEBIT_CONFIG_DIR="$AGENT_DIR/.motebit"
          npx create-motebit@latest test-runnable-agent --agent --yes
          cd test-runnable-agent
          npm install --no-audit --no-fund
          # The build catches the @types/node regression.
          npm run build
          # Importing dist/index.js as a module (not as the main script)
          # catches the main-module-guard regression: with the guard in
          # place, the import returns the default tools array. Without
          # the guard, this would either hang (recursive spawn) or fail.
          node -e "import('./dist/index.js').then(m => { if (!Array.isArray(m.default) || m.default.length === 0) { console.error('agent import returned no tools'); process.exit(1); } console.log('agent imports clean,', m.default.length, 'tools exported'); }).catch(e => { console.error('agent import failed:', e.message); process.exit(1); })"

          echo "Smoke tests passed."
