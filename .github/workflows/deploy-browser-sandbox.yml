name: Deploy Browser Sandbox

on:
  push:
    branches: [main]
    paths:
      - "services/browser-sandbox/**"
      - "packages/protocol/**"
  workflow_dispatch:

concurrency:
  group: deploy-browser-sandbox-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master

      # Required one-time setup before the first deploy:
      #   fly apps create motebit-browser-sandbox
      #   fly secrets --app motebit-browser-sandbox set \
      #     MOTEBIT_API_TOKEN=...
      #
      # No persistent volume — the service is stateless re: the motebit
      # graph (every Chromium context is per-session, torn down on
      # dispose / idle). Audit + receipts live upstream in the runtime.
      - name: Deploy to Fly.io
        run: flyctl deploy --config services/browser-sandbox/fly.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
