name: Publish Container Images

# Why this exists:
#
# Motebit's endgame is "operators run the relay, take the 5% fees" — third-party
# operators self-hosting the relay are the federation-unblock work. npm packages
# (the SDK, protocol, crypto verifiers) are not enough; the relay itself ships as
# a container so an operator can `docker pull ghcr.io/motebit/relay:X.Y.Z` and run.
#
# Every motebit-shipped image is:
#  - multi-arch (amd64 + arm64) via docker buildx — Apple Silicon dev,
#    Graviton/ARM cloud, single-arch is amateur in 2026.
#  - signed via cosign keyless OIDC + Sigstore — motebit's whole thesis is
#    verifiability (`docs/doctrine/self-attesting-system.md`); shipping unsigned
#    containers from a project whose value prop is "verify everything" is
#    incoherent.
#  - SBOM-attached (SPDX) — supply-chain audit surface.
#  - build-provenance attested (SLSA) via actions/attest-build-provenance —
#    binds the image to this exact workflow run + commit, verifiable by any
#    operator before pulling.
#  - tagged by SHA + branch/tag — never `:latest` (drift). Operators pin to
#    a version they verified.
#  - base-image pinned by SHA256 digest in the Dockerfile — same supply-chain
#    discipline motebit applies to FIDO/Apple/TPM trust roots in
#    `crypto-webauthn` / `crypto-appattest` / `crypto-tpm`.

on:
  push:
    branches: [main]
    tags:
      - "relay-v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  relay:
    name: ghcr.io/motebit/relay
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set image tag values
        id: tags
        run: |
          set -eu
          short_sha="${GITHUB_SHA:0:7}"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

          # Tag list: always sha-<short>, plus :main on main branch, plus :X.Y.Z
          # if this is a relay-vX.Y.Z tag push.
          tags="ghcr.io/motebit/relay:sha-${short_sha}"
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            tags="${tags}\nghcr.io/motebit/relay:main"
          fi
          case "${GITHUB_REF}" in
            refs/tags/relay-v*)
              version="${GITHUB_REF#refs/tags/relay-v}"
              tags="${tags}\nghcr.io/motebit/relay:${version}"
              echo "version=${version}" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "version=0.0.0+sha.${short_sha}" >> "$GITHUB_OUTPUT"
              ;;
          esac
          {
            echo 'tags<<EOF'
            printf '%b' "$tags"
            echo
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (cross-arch emulation for arm64 builds)
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (amd64 + arm64)
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: services/relay/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          # Dynamic labels — Dockerfile carries static metadata; per-build
          # provenance fields go here so they reflect this exact run.
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.tags.outputs.version }}
            org.opencontainers.image.created=${{ steps.tags.outputs.created }}
          # Provenance + SBOM at build time. buildx writes both as image
          # attestations attached to the manifest list.
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image (cosign keyless via Sigstore)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          # Sign every published tag. The image digest is identical across tags
          # (they all point to the same manifest list), so this signs the
          # underlying artifact once per tag reference.
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            cosign sign --yes "${tag}@${DIGEST}"
          done <<< "${{ steps.tags.outputs.tags }}"

      - name: Attest build provenance (SLSA)
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ghcr.io/motebit/relay
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
