<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>motebit — golden frame harness</title>
    <!--
      Golden-frame visual-regression harness (docs/doctrine/creature-canon.md).
      Not linked from the app. Renders the creature deterministically at a
      canonical pose × performance and lets Playwright screenshot the canvas.
      Bare page: fixed-size canvas in a bare wrapper, no app chrome, no HUD.
    -->
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      html,
      body {
        background: #000;
      }
      #golden-wrap {
        position: relative;
        width: 640px;
        height: 640px;
      }
      #golden-canvas {
        display: block;
        width: 640px;
        height: 640px;
      }
    </style>
  </head>
  <body>
    <div id="golden-wrap"><canvas id="golden-canvas" width="640" height="640"></canvas></div>
    <script type="module" src="/src/golden-main.ts"></script>
  </body>
</html>
