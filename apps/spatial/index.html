<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>motebit &mdash; spatial</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0f;
      color: #e0e0e8;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .overlay {
      position: relative;
      z-index: 1;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .title {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.5;
    }

    .status {
      font-size: 13px;
      opacity: 0.4;
      min-height: 20px;
    }

    #enter-ar {
      padding: 16px 40px;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.05em;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.06);
      color: #e0e0e8;
      cursor: pointer;
      transition: all 0.2s ease;
      backdrop-filter: blur(8px);
    }

    #enter-ar:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.25);
    }

    #enter-ar:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .overlay.hidden { display: none; }

    /* === Settings Overlay === */

    .settings-overlay {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(10, 10, 15, 0.92);
      backdrop-filter: blur(16px);
      overflow-y: auto;
    }

    .settings-overlay.hidden { display: none; }

    .settings-panel {
      width: 340px;
      max-width: 90vw;
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding: 24px 0;
    }

    .settings-title {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.5;
      text-align: center;
    }

    .settings-section {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0.35;
      margin-top: 8px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group label {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      opacity: 0.5;
    }

    .form-group select,
    .form-group input[type="text"],
    .form-group input[type="password"] {
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.04);
      color: #e0e0e8;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group select:focus,
    .form-group input:focus {
      border-color: rgba(255, 255, 255, 0.3);
    }

    .form-group select option {
      background: #1a1a24;
      color: #e0e0e8;
    }

    .toggle-group {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 0;
    }

    .toggle-group label {
      font-size: 13px;
      opacity: 0.7;
    }

    .toggle-switch {
      position: relative;
      width: 44px;
      height: 24px;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle-slider::before {
      content: "";
      position: absolute;
      left: 2px;
      top: 2px;
      width: 20px;
      height: 20px;
      background: #e0e0e8;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle-switch input:checked + .toggle-slider {
      background: rgba(120, 160, 255, 0.4);
    }

    .toggle-switch input:checked + .toggle-slider::before {
      transform: translateX(20px);
    }

    /* === Slider === */

    .slider-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .slider-group label {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      opacity: 0.5;
    }

    .slider-group input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 2px;
      outline: none;
    }

    .slider-group input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      background: #e0e0e8;
      border-radius: 50%;
      cursor: pointer;
    }

    .settings-actions {
      display: flex;
      gap: 10px;
      margin-top: 4px;
    }

    .settings-actions button {
      flex: 1;
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      letter-spacing: 0.03em;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.06);
      color: #e0e0e8;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .settings-actions button:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.25);
    }

    .settings-actions .primary {
      background: rgba(120, 160, 255, 0.15);
      border-color: rgba(120, 160, 255, 0.3);
    }

    .settings-actions .primary:hover {
      background: rgba(120, 160, 255, 0.25);
    }

    /* === Voice Indicator === */

    .voice-indicator {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      opacity: 0.4;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(8px);
    }

    .voice-indicator.hidden { display: none; }

    /* === Gaze Overlay === */

    .gaze-overlay {
      position: fixed;
      z-index: 6;
      pointer-events: none;
      padding: 10px 14px;
      background: rgba(10, 10, 15, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      backdrop-filter: blur(12px);
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 140px;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .gaze-overlay.visible {
      opacity: 1;
    }

    .gaze-overlay.hidden { display: none; }

    .gaze-agent-id {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: #e0e0e8;
      font-variant-numeric: tabular-nums;
    }

    .gaze-agent-trust {
      font-size: 11px;
      opacity: 0.55;
      letter-spacing: 0.05em;
    }

    .gaze-agent-caps {
      font-size: 11px;
      opacity: 0.4;
      letter-spacing: 0.03em;
    }

    /* === Delegation Active Indicator === */
    /* Subtle amber pulse in the corner when your motebit is away on a task. */

    .delegation-indicator {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 7;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      font-size: 11px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: rgba(255, 186, 80, 0.85);
      border: 1px solid rgba(255, 186, 80, 0.2);
      border-radius: 14px;
      background: rgba(255, 140, 0, 0.07);
      backdrop-filter: blur(8px);
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }

    .delegation-indicator.active {
      opacity: 1;
    }

    .delegation-indicator.hidden {
      display: none;
    }

    .delegation-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255, 186, 80, 0.8);
      animation: delegation-pulse 2.4s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes delegation-pulse {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.4); }
    }

    .voice-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(120, 160, 255, 0.6);
      animation: voice-pulse 2s ease-in-out infinite;
    }

    @keyframes voice-pulse {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.3); }
    }
    /* === MCP Server List === */

    .mcp-server-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      font-size: 13px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .mcp-server-item:last-child { border-bottom: none; }

    .mcp-server-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .mcp-server-dot.connected { background: rgba(80, 200, 120, 0.7); }
    .mcp-server-dot.disconnected { background: rgba(255, 255, 255, 0.2); }

    .mcp-server-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .mcp-server-tools {
      font-size: 11px;
      opacity: 0.4;
      flex-shrink: 0;
    }

    .mcp-server-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .mcp-server-actions button {
      padding: 2px 8px;
      font-size: 11px;
      font-family: inherit;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.04);
      color: #e0e0e8;
      cursor: pointer;
      opacity: 0.6;
    }

    .mcp-server-actions button:hover { opacity: 1; }

    /* === Color Swatches === */

    .color-swatch {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s;
      flex-shrink: 0;
    }

    .color-swatch:hover { transform: scale(1.1); }

    .color-swatch.active {
      border-color: rgba(255, 255, 255, 0.7);
      transform: scale(1.1);
    }

    .color-swatch.custom-swatch {
      background: conic-gradient(
        hsl(0,70%,65%), hsl(60,70%,65%), hsl(120,70%,65%),
        hsl(180,70%,65%), hsl(240,70%,65%), hsl(300,70%,65%), hsl(360,70%,65%)
      );
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <!-- Settings overlay — shown before AR entry when no saved config -->
  <div class="settings-overlay" id="settings-overlay">
    <div class="settings-panel">
      <div class="settings-title">motebit &middot; spatial</div>
      <form id="settings-form">
        <!-- Soul Color -->
        <div class="settings-section">Soul</div>
        <div id="color-swatches" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
        <div id="custom-color-picker" style="display:none;margin-top:8px;">
          <div class="slider-group">
            <label for="hue-slider">Hue</label>
            <input type="range" id="hue-slider" min="0" max="360" step="1" value="220" style="background:linear-gradient(to right,hsl(0,80%,60%),hsl(60,80%,60%),hsl(120,80%,60%),hsl(180,80%,60%),hsl(240,80%,60%),hsl(300,80%,60%),hsl(360,80%,60%));" />
          </div>
          <div class="slider-group">
            <label for="sat-slider">Saturation</label>
            <input type="range" id="sat-slider" min="0" max="100" step="1" value="70" />
          </div>
        </div>

        <!-- AI Provider -->
        <div class="settings-section">Intelligence</div>
        <div class="form-group">
          <label for="provider-select">Provider</label>
          <select id="provider-select">
            <option value="anthropic">Anthropic</option>
            <option value="ollama">Ollama (local)</option>
          </select>
        </div>
        <div class="form-group" id="api-key-group">
          <label for="api-key-input">API Key</label>
          <input type="password" id="api-key-input" placeholder="sk-ant-..." autocomplete="off" />
        </div>
        <div class="form-group">
          <label for="model-input">Model (optional)</label>
          <input type="text" id="model-input" placeholder="Default" />
        </div>

        <!-- Voice -->
        <div class="settings-section">Voice</div>
        <div class="toggle-group">
          <label for="voice-toggle">Voice input</label>
          <div class="toggle-switch">
            <input type="checkbox" id="voice-toggle" checked />
            <span class="toggle-slider"></span>
          </div>
        </div>
        <div class="form-group">
          <label for="openai-key-input">OpenAI API Key (for TTS)</label>
          <input type="password" id="openai-key-input" placeholder="sk-... (optional)" autocomplete="off" />
        </div>
        <div class="form-group">
          <label for="tts-voice-select">TTS Voice</label>
          <select id="tts-voice-select">
            <option value="nova">Nova</option>
            <option value="alloy">Alloy</option>
            <option value="echo">Echo</option>
            <option value="fable">Fable</option>
            <option value="onyx">Onyx</option>
            <option value="shimmer">Shimmer</option>
          </select>
        </div>
        <div class="slider-group">
          <label for="vad-sensitivity">VAD Sensitivity</label>
          <input type="range" id="vad-sensitivity" min="0" max="1" step="0.1" value="0.5" />
        </div>

        <!-- Network -->
        <div class="settings-section">Network</div>
        <div class="form-group">
          <label for="relay-url-input">Relay URL</label>
          <input type="text" id="relay-url-input" placeholder="https://motebit-sync.fly.dev" autocomplete="off" />
        </div>
        <div class="toggle-group">
          <label for="show-network-toggle">Show network</label>
          <div class="toggle-switch">
            <input type="checkbox" id="show-network-toggle" checked />
            <span class="toggle-slider"></span>
          </div>
        </div>

        <!-- MCP Servers -->
        <div class="settings-section">MCP Servers</div>
        <div id="mcp-server-list" style="margin-bottom:4px;"></div>
        <div style="display:flex;gap:6px;">
          <input type="text" id="mcp-add-name" placeholder="Name" style="flex:1;padding:10px 14px;font-size:14px;font-family:inherit;border:1px solid rgba(255,255,255,0.12);border-radius:8px;background:rgba(255,255,255,0.04);color:#e0e0e8;outline:none;" />
          <input type="text" id="mcp-add-url" placeholder="https://..." style="flex:2;padding:10px 14px;font-size:14px;font-family:inherit;border:1px solid rgba(255,255,255,0.12);border-radius:8px;background:rgba(255,255,255,0.04);color:#e0e0e8;outline:none;" />
        </div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:4px;">
          <label style="display:flex;align-items:center;gap:4px;cursor:pointer;font-size:12px;opacity:0.6;">
            <input type="checkbox" id="mcp-add-motebit" /> Motebit agent
          </label>
          <button type="button" id="mcp-add-btn" style="margin-left:auto;padding:6px 14px;font-size:13px;font-weight:600;font-family:inherit;border:1px solid rgba(255,255,255,0.15);border-radius:8px;background:rgba(255,255,255,0.06);color:#e0e0e8;cursor:pointer;">Add</button>
        </div>

        <!-- Credentials -->
        <div class="settings-section">Credentials</div>
        <div id="spatial-credentials-count" style="font-size:12px;opacity:0.5;margin-bottom:4px;">No credentials</div>
        <div id="spatial-credentials-list" style="max-height:120px;overflow-y:auto;"></div>

        <!-- Behavior -->
        <div class="settings-section">Behavior</div>
        <div class="toggle-group">
          <label for="proactive-toggle">Proactive awareness</label>
          <div class="toggle-switch">
            <input type="checkbox" id="proactive-toggle" checked />
            <span class="toggle-slider"></span>
          </div>
        </div>

        <div class="settings-actions">
          <button type="button" id="settings-skip">Skip</button>
          <button type="button" id="settings-save" class="primary">Connect</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Main overlay — Enter AR + status -->
  <div class="overlay hidden" id="overlay">
    <div class="title">motebit &middot; spatial</div>
    <button id="enter-ar">Enter AR</button>
    <div class="status" id="status"></div>
  </div>

  <!-- Voice indicator — shown when listening -->
  <div class="voice-indicator hidden" id="voice-indicator">
    <span class="voice-dot"></span>
    listening
  </div>

  <!-- Gaze overlay — shown when looking at a visitor or the ghost -->
  <!-- For visitors: shows their motebit_id, trust level, and task.    -->
  <!-- For the ghost: shows "Your agent is away — delegated to {target}" -->
  <div class="gaze-overlay hidden" id="gaze-overlay">
    <div class="gaze-agent-id" id="gaze-agent-id"></div>
    <div class="gaze-agent-trust" id="gaze-agent-trust"></div>
    <div class="gaze-agent-caps" id="gaze-agent-caps"></div>
  </div>

  <!-- Delegation active indicator — shown when your motebit is away on a task -->
  <div class="delegation-indicator hidden" id="delegation-indicator">
    <span class="delegation-dot"></span>
    <span id="delegation-label">away</span>
  </div>

  <script type="module" src="/src/app.ts"></script>
</body>
</html>
