<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>motebit &mdash; spatial</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0f;
      color: #e0e0e8;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .overlay {
      position: relative;
      z-index: 1;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .title {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.5;
    }

    .status {
      font-size: 13px;
      opacity: 0.4;
      min-height: 20px;
    }

    #enter-ar {
      padding: 16px 40px;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.05em;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.06);
      color: #e0e0e8;
      cursor: pointer;
      transition: all 0.2s ease;
      backdrop-filter: blur(8px);
    }

    #enter-ar:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.25);
    }

    #enter-ar:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .overlay.hidden { display: none; }

    /* === Settings Overlay === */

    .settings-overlay {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(10, 10, 15, 0.92);
      backdrop-filter: blur(16px);
    }

    .settings-overlay.hidden { display: none; }

    .settings-panel {
      width: 340px;
      max-width: 90vw;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .settings-title {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.5;
      text-align: center;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group label {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      opacity: 0.5;
    }

    .form-group select,
    .form-group input[type="text"],
    .form-group input[type="password"] {
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.04);
      color: #e0e0e8;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group select:focus,
    .form-group input:focus {
      border-color: rgba(255, 255, 255, 0.3);
    }

    .form-group select option {
      background: #1a1a24;
      color: #e0e0e8;
    }

    .toggle-group {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 0;
    }

    .toggle-group label {
      font-size: 13px;
      opacity: 0.7;
    }

    .toggle-switch {
      position: relative;
      width: 44px;
      height: 24px;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle-slider::before {
      content: "";
      position: absolute;
      left: 2px;
      top: 2px;
      width: 20px;
      height: 20px;
      background: #e0e0e8;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle-switch input:checked + .toggle-slider {
      background: rgba(120, 160, 255, 0.4);
    }

    .toggle-switch input:checked + .toggle-slider::before {
      transform: translateX(20px);
    }

    .settings-actions {
      display: flex;
      gap: 10px;
      margin-top: 4px;
    }

    .settings-actions button {
      flex: 1;
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      letter-spacing: 0.03em;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.06);
      color: #e0e0e8;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .settings-actions button:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.25);
    }

    .settings-actions .primary {
      background: rgba(120, 160, 255, 0.15);
      border-color: rgba(120, 160, 255, 0.3);
    }

    .settings-actions .primary:hover {
      background: rgba(120, 160, 255, 0.25);
    }

    /* === Voice Indicator === */

    .voice-indicator {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      opacity: 0.4;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(8px);
    }

    .voice-indicator.hidden { display: none; }

    .voice-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(120, 160, 255, 0.6);
      animation: voice-pulse 2s ease-in-out infinite;
    }

    @keyframes voice-pulse {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.3); }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <!-- Settings overlay — shown before AR entry when no saved config -->
  <div class="settings-overlay" id="settings-overlay">
    <div class="settings-panel">
      <div class="settings-title">motebit &middot; spatial</div>
      <form id="settings-form">
        <div class="form-group">
          <label for="provider-select">Provider</label>
          <select id="provider-select">
            <option value="anthropic">Anthropic</option>
            <option value="ollama">Ollama (local)</option>
          </select>
        </div>
        <div class="form-group" id="api-key-group">
          <label for="api-key-input">API Key</label>
          <input type="password" id="api-key-input" placeholder="sk-ant-..." autocomplete="off" />
        </div>
        <div class="form-group">
          <label for="model-input">Model (optional)</label>
          <input type="text" id="model-input" placeholder="Default" />
        </div>
        <div class="toggle-group">
          <label for="voice-toggle">Voice</label>
          <div class="toggle-switch">
            <input type="checkbox" id="voice-toggle" checked />
            <span class="toggle-slider"></span>
          </div>
        </div>
        <div class="settings-actions">
          <button type="button" id="settings-skip">Skip</button>
          <button type="button" id="settings-save" class="primary">Connect</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Main overlay — Enter AR + status -->
  <div class="overlay hidden" id="overlay">
    <div class="title">motebit &middot; spatial</div>
    <button id="enter-ar">Enter AR</button>
    <div class="status" id="status"></div>
  </div>

  <!-- Voice indicator — shown when listening -->
  <div class="voice-indicator hidden" id="voice-indicator">
    <span class="voice-dot"></span>
    listening
  </div>

  <script type="module" src="/src/app.ts"></script>
</body>
</html>
