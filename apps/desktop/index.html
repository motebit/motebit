<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Motebit</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1e1e2e; }
    canvas { display: block; width: 100%; height: 100%; }

    /* Chat overlay */
    #chat-container {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      max-height: 50vh;
      display: flex;
      flex-direction: column;
      pointer-events: none;
      z-index: 10;
      padding: 0 16px 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    #chat-log {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 12px 0;
      mask-image: linear-gradient(transparent 0%, black 30%);
      -webkit-mask-image: linear-gradient(transparent 0%, black 30%);
      pointer-events: auto;
    }
    #chat-log:empty { display: none; }
    .chat-bubble {
      max-width: 70%;
      padding: 8px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.45;
      word-wrap: break-word;
    }
    .chat-bubble.user {
      align-self: flex-end;
      background: rgba(99, 102, 241, 0.85);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .chat-bubble.assistant {
      align-self: flex-start;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-bottom-left-radius: 4px;
    }
    .chat-bubble.system {
      align-self: center;
      background: rgba(255, 255, 255, 0.05);
      color: rgba(255, 255, 255, 0.5);
      font-size: 12px;
      border-radius: 8px;
      white-space: pre-line;
    }
    #chat-input-row {
      pointer-events: auto;
    }
    #chat-input {
      width: 100%;
      padding: 10px 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: #fff;
      font-size: 14px;
      outline: none;
      font-family: inherit;
    }
    #chat-input::placeholder { color: rgba(255, 255, 255, 0.35); }
    #chat-input:focus { border-color: rgba(99, 102, 241, 0.5); }

    /* Gear icon */
    #settings-btn {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 20;
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: rgba(255, 255, 255, 0.5);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, color 0.2s;
    }
    #settings-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      color: rgba(255, 255, 255, 0.8);
    }

    /* Settings panel */
    #settings-backdrop {
      position: fixed;
      inset: 0;
      z-index: 30;
      background: rgba(0, 0, 0, 0.4);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    #settings-backdrop.open { opacity: 1; pointer-events: auto; }

    #settings-panel {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      z-index: 31;
      width: 280px;
      background: rgba(30, 30, 46, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-left: 1px solid rgba(255, 255, 255, 0.08);
      transform: translateX(100%);
      transition: transform 0.25s ease;
      padding: 24px 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: rgba(255, 255, 255, 0.85);
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
    }
    #settings-panel.open { transform: translateX(0); }

    #settings-panel h2 {
      font-size: 16px;
      font-weight: 600;
      margin: 0;
    }
    #settings-panel label {
      display: block;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 4px;
    }
    #settings-panel select,
    #settings-panel input[type="text"],
    #settings-panel input[type="password"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.06);
      color: #fff;
      font-size: 13px;
      outline: none;
      font-family: inherit;
    }
    #settings-panel select:focus,
    #settings-panel input:focus {
      border-color: rgba(99, 102, 241, 0.5);
    }
    .settings-field { display: flex; flex-direction: column; }
    .settings-key-row { display: flex; gap: 6px; }
    .settings-key-row input { flex: 1; }
    .settings-key-row button {
      padding: 6px 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.06);
      color: rgba(255, 255, 255, 0.6);
      font-size: 12px;
      cursor: pointer;
    }
    .settings-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .settings-actions button {
      flex: 1;
      padding: 8px 0;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
    }
    .settings-actions .save-btn {
      background: rgba(99, 102, 241, 0.85);
      color: #fff;
    }
    .settings-actions .save-btn:hover { background: rgba(99, 102, 241, 1); }
    .settings-actions .cancel-btn {
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.7);
    }
    .settings-actions .cancel-btn:hover { background: rgba(255, 255, 255, 0.15); }

    /* Tool status messages */
    .tool-status {
      align-self: center;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.35);
      font-style: italic;
      padding: 2px 10px;
      animation: pulse 1.5s ease-in-out infinite;
    }
    .tool-status.done {
      animation: none;
      transition: opacity 0.5s ease;
    }
    .tool-status.fade-out { opacity: 0; }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.8; }
    }

    /* Approval cards */
    .approval-card {
      align-self: flex-start;
      max-width: 70%;
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid rgba(99, 102, 241, 0.4);
      background: rgba(99, 102, 241, 0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      font-size: 13px;
      color: rgba(255, 255, 255, 0.85);
    }
    .approval-card .approval-tool {
      font-weight: 600;
      margin-bottom: 4px;
    }
    .approval-card .approval-args {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.45);
      margin-bottom: 8px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 100%;
    }
    .approval-card .approval-buttons {
      display: flex;
      gap: 6px;
    }
    .approval-card .approval-buttons button {
      padding: 4px 12px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
    }
    .approval-card .btn-allow {
      background: rgba(99, 102, 241, 0.85);
      color: #fff;
    }
    .approval-card .btn-allow:hover { background: rgba(99, 102, 241, 1); }
    .approval-card .btn-deny {
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.6);
    }
    .approval-card .btn-deny:hover { background: rgba(255, 255, 255, 0.18); }
    .approval-card .approval-buttons button:disabled {
      opacity: 0.4;
      cursor: default;
    }

    /* Operator mode toggle */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .toggle-row .toggle-label { font-size: 13px; color: rgba(255, 255, 255, 0.85); }
    .toggle-row .toggle-desc {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
      margin-top: 2px;
    }
    .toggle-switch {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-switch .slider {
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle-switch .slider::before {
      content: "";
      position: absolute;
      left: 2px;
      top: 2px;
      width: 16px;
      height: 16px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle-switch input:checked + .slider {
      background: rgba(99, 102, 241, 0.85);
    }
    .toggle-switch input:checked + .slider::before {
      transform: translateX(16px);
    }

    /* PIN dialog */
    #pin-backdrop {
      position: fixed;
      inset: 0;
      z-index: 40;
      background: rgba(0, 0, 0, 0.5);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #pin-backdrop.open { opacity: 1; pointer-events: auto; }
    #pin-dialog {
      background: rgba(30, 30, 46, 0.97);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 24px;
      width: 260px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: rgba(255, 255, 255, 0.85);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    #pin-dialog #pin-title {
      font-size: 15px;
      font-weight: 600;
      text-align: center;
    }
    #pin-dialog input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.06);
      color: #fff;
      font-size: 18px;
      letter-spacing: 8px;
      text-align: center;
      outline: none;
      font-family: inherit;
    }
    #pin-dialog input:focus { border-color: rgba(99, 102, 241, 0.5); }
    #pin-dialog input::placeholder { letter-spacing: normal; font-size: 13px; color: rgba(255,255,255,0.3); }
    #pin-error {
      font-size: 12px;
      color: #f87171;
      text-align: center;
      min-height: 16px;
    }
    #pin-dialog .pin-actions {
      display: flex;
      gap: 8px;
    }
    #pin-dialog .pin-actions button {
      flex: 1;
      padding: 8px 0;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
    }
    #pin-cancel {
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.7);
    }
    #pin-cancel:hover { background: rgba(255, 255, 255, 0.15); }
    #pin-submit {
      background: rgba(99, 102, 241, 0.85);
      color: #fff;
    }
    #pin-submit:hover { background: rgba(99, 102, 241, 1); }
    #pin-confirm-input { display: none; }

    /* Welcome dialog */
    #welcome-backdrop {
      position: fixed;
      inset: 0;
      z-index: 50;
      background: rgba(0, 0, 0, 0.5);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #welcome-backdrop.open { opacity: 1; pointer-events: auto; }
    #welcome-dialog {
      background: rgba(30, 30, 46, 0.97);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 28px 24px;
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: rgba(255, 255, 255, 0.85);
      display: flex;
      flex-direction: column;
      gap: 14px;
      text-align: center;
    }
    #welcome-title {
      font-size: 17px;
      font-weight: 600;
    }
    #welcome-text {
      font-size: 13px;
      line-height: 1.5;
      color: rgba(255, 255, 255, 0.55);
    }
    #welcome-start {
      padding: 10px 0;
      border: none;
      border-radius: 10px;
      background: rgba(99, 102, 241, 0.85);
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
      margin-top: 4px;
    }
    #welcome-start:hover { background: rgba(99, 102, 241, 1); }
  </style>
</head>
<body>
  <canvas id="motebit-canvas"></canvas>
  <button id="settings-btn" title="Settings">&#9881;</button>
  <div id="settings-backdrop"></div>
  <div id="settings-panel">
    <h2>Settings</h2>
    <div class="settings-field">
      <label for="settings-provider">Provider</label>
      <select id="settings-provider">
        <option value="ollama">Ollama</option>
        <option value="anthropic">Anthropic</option>
      </select>
    </div>
    <div class="settings-field">
      <label for="settings-model">Model</label>
      <input id="settings-model" type="text" placeholder="e.g. llama3.2, claude-sonnet-4-20250514" />
    </div>
    <div class="settings-field">
      <label for="settings-apikey">API Key</label>
      <div class="settings-key-row">
        <input id="settings-apikey" type="password" placeholder="sk-ant-..." />
        <button id="settings-apikey-toggle" type="button">Show</button>
      </div>
    </div>
    <div class="settings-field">
      <div class="toggle-row">
        <div>
          <div class="toggle-label">Operator Mode</div>
          <div class="toggle-desc">Allow high-risk tools (write, execute, payments)</div>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" id="settings-operator-mode" />
          <span class="slider"></span>
        </label>
      </div>
    </div>
    <div class="settings-field">
      <button id="settings-reset-pin" style="background:none;border:none;color:rgba(255,255,255,0.35);font-size:12px;cursor:pointer;padding:0;font-family:inherit;text-decoration:underline;">Reset PIN</button>
    </div>
    <div class="settings-actions">
      <button class="cancel-btn" id="settings-cancel">Cancel</button>
      <button class="save-btn" id="settings-save">Save</button>
    </div>
  </div>
  <div id="pin-backdrop">
    <div id="pin-dialog">
      <div id="pin-title">Enter PIN</div>
      <input id="pin-input" type="password" maxlength="6" placeholder="PIN" inputmode="numeric" pattern="\d*" />
      <input id="pin-confirm-input" type="password" maxlength="6" placeholder="Confirm PIN" inputmode="numeric" pattern="\d*" />
      <div id="pin-confirm-text" style="display:none;font-size:13px;color:rgba(255,255,255,0.6);text-align:center;"></div>
      <div id="pin-error"></div>
      <div class="pin-actions">
        <button id="pin-cancel">Cancel</button>
        <button id="pin-submit">OK</button>
      </div>
    </div>
  </div>
  <div id="welcome-backdrop" class="open">
    <div id="welcome-dialog">
      <div id="welcome-title">Welcome to Motebit</div>
      <div id="welcome-text">
        Motebit creates a local identity and device key to keep your
        conversations private. Your private key stays on this device
        and is stored in the system keyring.
      </div>
      <button id="welcome-start">Get started</button>
    </div>
  </div>
  <div id="chat-container">
    <div id="chat-log"></div>
    <div id="chat-input-row">
      <input id="chat-input" type="text" placeholder="Say something..." autocomplete="off" />
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
