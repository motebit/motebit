<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Motebit</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1e1e2e; }
    canvas { display: block; width: 100%; height: 100%; }

    /* Chat overlay */
    #chat-container {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      max-height: 50vh;
      display: flex;
      flex-direction: column;
      pointer-events: none;
      z-index: 10;
      padding: 0 16px 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    #chat-log {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 12px 0;
      mask-image: linear-gradient(transparent 0%, black 30%);
      -webkit-mask-image: linear-gradient(transparent 0%, black 30%);
      pointer-events: auto;
    }
    #chat-log:empty { display: none; }
    .chat-bubble {
      max-width: 70%;
      padding: 8px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.45;
      word-wrap: break-word;
    }
    .chat-bubble.user {
      align-self: flex-end;
      background: rgba(99, 102, 241, 0.85);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .chat-bubble.assistant {
      align-self: flex-start;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-bottom-left-radius: 4px;
    }
    .chat-bubble.system {
      align-self: center;
      background: rgba(255, 255, 255, 0.05);
      color: rgba(255, 255, 255, 0.5);
      font-size: 12px;
      border-radius: 8px;
    }
    #chat-input-row {
      pointer-events: auto;
    }
    #chat-input {
      width: 100%;
      padding: 10px 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: #fff;
      font-size: 14px;
      outline: none;
      font-family: inherit;
    }
    #chat-input::placeholder { color: rgba(255, 255, 255, 0.35); }
    #chat-input:focus { border-color: rgba(99, 102, 241, 0.5); }
  </style>
</head>
<body>
  <canvas id="motebit-canvas"></canvas>
  <div id="chat-container">
    <div id="chat-log"></div>
    <div id="chat-input-row">
      <input id="chat-input" type="text" placeholder="Say something..." autocomplete="off" />
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
