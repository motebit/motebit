<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" width="100%" preserveAspectRatio="xMidYMid meet" style="max-width: 100%; height: auto; font-family: ui-sans-serif, system-ui, sans-serif;">
  <title id="receipt-chain-title">Delegation receipt chain — independently signed at every hop</title>
  <desc id="receipt-chain-desc">A delegator submits a task. The executor signs an ExecutionReceipt with its own keypair, embedding its public_key. When the executor sub-delegates, the sub-executor signs its own receipt; the executor nests it inside delegation_receipts and signs the outer receipt over the whole tree. Every receipt in the tree is independently verifiable offline against its embedded public key. Settlement happens after the relay verifies the outer signature, with relay_task_id binding the receipt to the economic ledger entry.</desc>

  <g style="color: var(--color-fd-foreground);" font-family="inherit">
    <!-- Three actor lifelines -->
    <g stroke="var(--color-fd-border)" stroke-width="1" stroke-dasharray="2 4" fill="none">
      <line x1="120" y1="60" x2="120" y2="320" />
      <line x1="360" y1="60" x2="360" y2="320" />
      <line x1="600" y1="60" x2="600" y2="320" />
    </g>

    <!-- Actor headers -->
    <g>
      <rect x="60" y="32" width="120" height="34" rx="4" ry="4" fill="none" stroke="currentColor" stroke-width="1" />
      <text x="120" y="48" text-anchor="middle" font-size="12" font-weight="500" fill="currentColor">Delegator</text>
      <text x="120" y="60" text-anchor="middle" font-size="9" fill="var(--color-fd-muted-foreground)">key kD</text>

      <rect x="300" y="32" width="120" height="34" rx="4" ry="4" fill="none" stroke="currentColor" stroke-width="1" />
      <text x="360" y="48" text-anchor="middle" font-size="12" font-weight="500" fill="currentColor">Executor</text>
      <text x="360" y="60" text-anchor="middle" font-size="9" fill="var(--color-fd-muted-foreground)">key kE</text>

      <rect x="540" y="32" width="120" height="34" rx="4" ry="4" fill="none" stroke="currentColor" stroke-width="1" />
      <text x="600" y="48" text-anchor="middle" font-size="12" font-weight="500" fill="currentColor">Sub-executor</text>
      <text x="600" y="60" text-anchor="middle" font-size="9" fill="var(--color-fd-muted-foreground)">key kS</text>
    </g>

    <defs>
      <marker id="rc-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="currentColor" />
      </marker>
      <marker id="rc-arrow-primary" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--color-fd-primary)" />
      </marker>
    </defs>

    <!-- 1. Delegator → Executor: task -->
    <g stroke="currentColor" stroke-width="1.25" fill="none">
      <line x1="120" y1="100" x2="360" y2="100" marker-end="url(#rc-arrow)" />
    </g>
    <text x="240" y="92" text-anchor="middle" font-size="10" fill="var(--color-fd-muted-foreground)">submit task — relay_task_id, prompt</text>

    <!-- 2. Executor → Sub-executor: sub-task -->
    <g stroke="currentColor" stroke-width="1.25" fill="none">
      <line x1="360" y1="150" x2="600" y2="150" marker-end="url(#rc-arrow)" />
    </g>
    <text x="480" y="142" text-anchor="middle" font-size="10" fill="var(--color-fd-muted-foreground)">sub-delegate — scoped token (kE)</text>

    <!-- 3. Sub-executor → Executor: signed receipt -->
    <g stroke="var(--color-fd-primary)" stroke-width="1.25" fill="none">
      <line x1="600" y1="200" x2="360" y2="200" marker-end="url(#rc-arrow-primary)" />
    </g>
    <text x="480" y="192" text-anchor="middle" font-size="10" fill="var(--color-fd-primary)">sub-receipt: Sign(body, kS), public_key=kS</text>

    <!-- 4. Executor → Delegator: outer receipt with nested chain -->
    <g stroke="var(--color-fd-primary)" stroke-width="1.5" fill="none">
      <line x1="360" y1="250" x2="120" y2="250" marker-end="url(#rc-arrow-primary)" />
    </g>
    <text x="240" y="242" text-anchor="middle" font-size="10" fill="var(--color-fd-primary)">outer receipt: Sign(body+[sub-receipt], kE)</text>

    <!-- 5. Verify caption (below) -->
    <text x="360" y="298" text-anchor="middle" font-size="11" fill="var(--color-fd-foreground)" font-weight="500">Each receipt: JCS-canonicalize body − signature → Ed25519 verify against embedded public_key</text>
    <text x="360" y="316" text-anchor="middle" font-size="10" fill="var(--color-fd-muted-foreground)">Settlement fires after the outer signature verifies. relay_task_id is signature-bound — replays fail.</text>
  </g>
</svg>
