<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" width="100%" preserveAspectRatio="xMidYMid meet" style="max-width: 100%; height: auto; font-family: ui-sans-serif, system-ui, sans-serif;">
  <title id="protocol-stack-title">Protocol stack — motebit fills the missing layer underneath</title>
  <desc id="protocol-stack-desc">MCP defines what an agent can do (tool capabilities). A2A defines how agents communicate. x402 and AP2 define how they pay. None of those define who an agent is across time and devices, what trust it has accumulated, or what the operator's policy allows it to do. Motebit is the layer underneath: persistent cryptographic identity, signed receipts that compound into trust, and governance enforced at the agent's surface tension.</desc>

  <g style="font-family: inherit;">
    <!-- Three thin upper-layer rows, each one continuous tspan-typeset line -->
    <g>
      <rect x="100" y="30" width="520" height="44" fill="none"
            stroke="var(--color-fd-foreground, #1c1917)" stroke-width="1" />
      <text x="120" y="58" font-size="13"
            fill="var(--color-fd-foreground, #1c1917)">
        <tspan font-weight="600">MCP</tspan>
        <tspan font-weight="400" fill="var(--color-fd-muted-foreground, #78716c)"> — what the agent can do (tool capability)</tspan>
      </text>
    </g>
    <g>
      <rect x="100" y="84" width="520" height="44" fill="none"
            stroke="var(--color-fd-foreground, #1c1917)" stroke-width="1" />
      <text x="120" y="112" font-size="13"
            fill="var(--color-fd-foreground, #1c1917)">
        <tspan font-weight="600">A2A</tspan>
        <tspan font-weight="400" fill="var(--color-fd-muted-foreground, #78716c)"> — how agents talk to each other</tspan>
      </text>
    </g>
    <g>
      <rect x="100" y="138" width="520" height="44" fill="none"
            stroke="var(--color-fd-foreground, #1c1917)" stroke-width="1" />
      <text x="120" y="166" font-size="13"
            fill="var(--color-fd-foreground, #1c1917)">
        <tspan font-weight="600">x402 · AP2</tspan>
        <tspan font-weight="400" fill="var(--color-fd-muted-foreground, #78716c)"> — how agents pay</tspan>
      </text>
    </g>

    <!-- Thicker motebit layer underneath — primary stroke, two stacked text lines -->
    <g>
      <rect x="100" y="200" width="520" height="68" fill="none"
            stroke="var(--color-fd-primary, #0369a1)" stroke-width="1.75" />
      <text x="120" y="228" font-size="14"
            fill="var(--color-fd-primary, #0369a1)">
        <tspan font-weight="700">motebit</tspan>
        <tspan font-weight="400" fill="var(--color-fd-foreground, #1c1917)"> — who the agent is, what it has done, what it is allowed to do</tspan>
      </text>
      <text x="120" y="251" font-size="11"
            fill="var(--color-fd-muted-foreground, #78716c)">identity (Ed25519, did:key)  ·  trust (signed receipts)  ·  governance (policy gate)</text>
    </g>
  </g>
</svg>
