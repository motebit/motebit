<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" width="100%" preserveAspectRatio="xMidYMid meet" style="max-width: 100%; height: auto; font-family: ui-sans-serif, system-ui, sans-serif;">
  <title id="federation-topology-title">Three peer relays, bilateral peering, cross-relay routing</title>
  <desc id="federation-topology-desc">Three independent motebit relays form a federation. Each relay hosts agents and trust records. Relay A peers bilaterally with Relay B and Relay C; Relay B peers with Relay C. The semiring graph composes trust across hops, so an agent on Relay A can delegate to a target agent on Relay C via either a one-hop or two-hop path; the optimal route is selected automatically by trust-times-cost composition.</desc>

  <defs>
    <marker id="ft-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="currentColor" />
    </marker>
    <marker id="ft-arrow-primary" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--color-fd-primary)" />
    </marker>
  </defs>

  <g style="color: var(--color-fd-foreground);">
    <!-- Relay A (top-left) -->
    <g transform="translate(150 110)">
      <circle r="48" fill="none" stroke="currentColor" stroke-width="1.25" />
      <text text-anchor="middle" dy="-4" font-size="13" font-weight="500" fill="currentColor">Relay A</text>
      <text text-anchor="middle" dy="14" font-size="10" fill="var(--color-fd-muted-foreground)">agents · trust</text>
    </g>

    <!-- Relay B (top-right) -->
    <g transform="translate(570 110)">
      <circle r="48" fill="none" stroke="currentColor" stroke-width="1.25" />
      <text text-anchor="middle" dy="-4" font-size="13" font-weight="500" fill="currentColor">Relay B</text>
      <text text-anchor="middle" dy="14" font-size="10" fill="var(--color-fd-muted-foreground)">agents · trust</text>
    </g>

    <!-- Relay C (bottom-center) -->
    <g transform="translate(360 270)">
      <circle r="48" fill="none" stroke="currentColor" stroke-width="1.25" />
      <text text-anchor="middle" dy="-4" font-size="13" font-weight="500" fill="currentColor">Relay C</text>
      <text text-anchor="middle" dy="14" font-size="10" fill="var(--color-fd-muted-foreground)">agents · trust</text>
    </g>

    <!-- Bilateral peering: A ↔ B -->
    <g stroke="currentColor" stroke-width="1" fill="none">
      <line x1="200" y1="98" x2="520" y2="98" marker-end="url(#ft-arrow)" />
      <line x1="520" y1="122" x2="200" y2="122" marker-end="url(#ft-arrow)" />
    </g>
    <text x="360" y="92" text-anchor="middle" font-size="10" fill="var(--color-fd-muted-foreground)">peer (signed challenge)</text>

    <!-- Bilateral peering: A ↔ C -->
    <g stroke="currentColor" stroke-width="1" fill="none">
      <line x1="180" y1="158" x2="320" y2="240" marker-end="url(#ft-arrow)" />
      <line x1="335" y1="232" x2="195" y2="150" marker-end="url(#ft-arrow)" />
    </g>

    <!-- Bilateral peering: B ↔ C -->
    <g stroke="currentColor" stroke-width="1" fill="none">
      <line x1="540" y1="158" x2="400" y2="240" marker-end="url(#ft-arrow)" />
      <line x1="385" y1="232" x2="525" y2="150" marker-end="url(#ft-arrow)" />
    </g>

    <!-- Highlighted cross-relay route: agent on A → relay A → relay C → target agent -->
    <g stroke="var(--color-fd-primary)" stroke-width="1.75" fill="none" stroke-dasharray="4 3">
      <path d="M 110 110 Q 130 110 150 110" marker-end="url(#ft-arrow-primary)" />
      <path d="M 188 152 Q 270 200 322 240" marker-end="url(#ft-arrow-primary)" />
      <path d="M 360 318 Q 360 340 360 340" marker-end="url(#ft-arrow-primary)" />
    </g>

    <!-- Origin agent label (left edge, near A) -->
    <g transform="translate(60 110)">
      <circle r="12" fill="none" stroke="var(--color-fd-primary)" stroke-width="1.25" />
      <text text-anchor="middle" dy="3" font-size="9" fill="var(--color-fd-primary)">a₁</text>
      <text text-anchor="middle" dy="28" font-size="10" fill="var(--color-fd-muted-foreground)">origin</text>
    </g>

    <!-- Target agent label (below C) -->
    <g transform="translate(360 350)">
      <circle r="12" fill="none" stroke="var(--color-fd-primary)" stroke-width="1.25" />
      <text text-anchor="middle" dy="3" font-size="9" fill="var(--color-fd-primary)">a₂</text>
    </g>
    <text x="392" y="355" font-size="10" fill="var(--color-fd-muted-foreground)">target</text>

    <!-- Route legend -->
    <text x="20" y="20" font-size="10" fill="var(--color-fd-muted-foreground)">— peering edges (bilateral, signed)</text>
    <text x="20" y="36" font-size="10" fill="var(--color-fd-primary)">┄ optimal route (trust × cost composition)</text>
  </g>
</svg>
